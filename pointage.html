<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Milo's Pizza - Pointage</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bx:#B91E26;--bxdk:#8B1118;--bxlt:#D4464D;--tx:#2A0A0B;--txm:#7A4A35;--txf:#B08060;--sf:rgba(185,30,38,0.08);--sfb:rgba(185,30,38,0.15);--bd:rgba(185,30,38,0.2)}
body{min-height:100vh;background:#F2E0C0;font-family:-apple-system,Inter,system-ui,sans-serif;color:#2A0A0B;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;user-select:none;overflow:hidden}
.logo img{width:180px;height:auto;opacity:1;display:block;margin:0 auto}
.addr{font-size:11px;color:var(--txm);text-align:center;margin:4px 0 10px;letter-spacing:.5px}
.ct{font-size:50px;font-weight:700;letter-spacing:-2px;color:var(--bx);line-height:1;font-variant-numeric:tabular-nums;text-align:center}
.cd{font-size:12px;color:#7A4A35;text-align:center;margin-top:3px;text-transform:capitalize}
.panel{width:100%;max-width:320px;background:var(--bx);border:2px solid var(--bxdk);border-radius:24px;padding:26px 22px;margin-top:14px}
.screen{display:none}.screen.active{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pi{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.ii{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;cursor:pointer}
.ii:active{transform:scale(.93)}
.it{color:#fff;font-size:16px;font-weight:600;text-align:center}
.is{color:rgba(255,255,255,0.6);font-size:11px;text-align:center;margin-top:8px;line-height:1.5}
.pl{color:rgba(255,255,255,0.8);font-size:13px;text-align:center;margin-bottom:20px}
.pd{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pd div{width:46px;height:46px;border-radius:10px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.pd div.f{background:var(--bx);border-color:var(--bx)}
.pd div.f::after{content:'';width:12px;height:12px;border-radius:50%;background:#fff;display:block}
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:228px;margin:0 auto}
.nb{height:58px;border-radius:12px;border:none;cursor:pointer;font-size:22px;font-weight:600;background:rgba(255,255,255,.18);color:#fff;transition:transform .1s,background .1s}
.nb:active{transform:scale(.92);background:rgba(255,255,255,.28)}
.nc{background:rgba(255,255,255,.15);color:#fff;font-size:20px;border:1px solid rgba(255,255,255,.4)}
.nc.r{background:#fff;color:var(--bx);font-size:22px;box-shadow:0 4px 16px rgba(0,0,0,.3);border:none;font-weight:700}
.ca{display:block;margin:14px auto 0;background:none;border:none;color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer}
.cl{color:rgba(255,255,255,0.85);font-size:13px;text-align:center;margin-bottom:14px}
.cl strong{color:#fff}
.cw{position:relative;display:block;width:fit-content;margin:0 auto;border-radius:14px;overflow:hidden;border:2px solid var(--bd)}
#video{width:210px;height:158px;object-fit:cover;display:block;background:#0D0405}
.co{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35)}
.cc{width:60px;height:60px;border-radius:50%;background:rgba(185,30,38,.9);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;box-shadow:0 0 0 8px rgba(185,30,38,.25)}
.ce{color:#fc8181;font-size:12px;text-align:center;padding:16px 0}
.ci{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px;animation:pi .3s ease}
.ci.entree{background:linear-gradient(135deg,#276749,#38a169);box-shadow:0 8px 24px rgba(56,161,105,.4)}
.ci.sortie{background:linear-gradient(135deg,var(--bxdk),var(--bx));box-shadow:0 8px 24px rgba(185,30,38,.4)}
.cb{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
.cb.entree{background:rgba(56,161,105,.15);border:1px solid rgba(56,161,105,.4);color:#68d391}
.cb.sortie{background:rgba(185,30,38,.15);border:1px solid rgba(185,30,38,.4);color:var(--bxlt)}
.cti{color:#fff;font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.ctm{color:rgba(255,255,255,0.75);font-size:13px;text-align:center}
.ctm strong{color:#fff}
.cn{color:rgba(255,255,255,0.5);font-size:12px;text-align:center;margin-top:8px}
.ei{width:68px;height:68px;border-radius:50%;background:rgba(185,30,38,.1);border:2px solid var(--bx);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;color:var(--bx)}
.em{color:#fc8181;font-size:14px;font-weight:600;text-align:center}
.es{color:rgba(255,255,255,0.5);font-size:12px;text-align:center;margin-top:8px}
.rg{color:#B08060;font-size:10px;margin-top:14px;text-align:center;max-width:280px;line-height:1.5}
canvas{display:none}
</style>
</head>

<div class="addr" id="addr"></div>
<div style="text-align:center;margin-bottom:4px">
  <div class="ct" id="ct">--:--</div>
  <div class="cd" id="cd"></div>
</div>
<div class="panel">
  <div class="screen active" id="screen-idle">
    <div class="ii" onclick="showPin()">&#128070;</div>
    <div class="it">Toucher pour pointer</div>
    <div class="is">Ce terminal enregistre une photo &#224; chaque badgeage.</div>
  </div>
  <div class="screen" id="screen-pin">
    <div class="pl">Saisir votre code PIN</div>
    <div class="pd"><div id="d0"></div><div id="d1"></div><div id="d2"></div><div id="d3"></div></div>
    <div class="np">
      <button class="nb" onclick="pk('1')">1</button><button class="nb" onclick="pk('2')">2</button><button class="nb" onclick="pk('3')">3</button>
      <button class="nb" onclick="pk('4')">4</button><button class="nb" onclick="pk('5')">5</button><button class="nb" onclick="pk('6')">6</button>
      <button class="nb" onclick="pk('7')">7</button><button class="nb" onclick="pk('8')">8</button><button class="nb" onclick="pk('9')">9</button>
      <button class="nb" onclick="pk('back')" style="font-size:18px">&#9003;</button>
      <button class="nb" onclick="pk('0')">0</button>
      <button class="nb nc" id="bc" onclick="cp()">&#10003;</button>
    </div>
    <button class="ca" onclick="reset()">Annuler</button>
  </div>
  <div class="screen" id="screen-camera">
    <div class="cl">Bonjour <strong id="ep"></strong> &#8212; photo en cours&#8230;</div>
    <div id="cc"><div class="cw"><video id="video" muted playsinline autoplay></video><div class="co"><div class="cc" id="cd2">3</div></div></div></div>
    <div class="ce" id="ce" style="display:none"></div>
    <canvas id="canvas"></canvas>
  </div>
  <div class="screen" id="screen-confirm">
    <div class="ci" id="ci">&#10003;</div>
    <div style="text-align:center"><div class="cb" id="cb"></div></div>
    <div class="cti" id="cti"></div>
    <div class="ctm" id="ctm"></div>
    <div class="cn" id="cna"></div>
  </div>
  <div class="screen" id="screen-error">
    <div class="ei">&#10005;</div>
    <div class="em" id="em"></div>
    <div class="es">R&#233;essai dans 3 secondes&#8230;</div>
  </div>
</div>
<div class="rg">Photos conserv&#233;es 90 jours &#183; Acc&#232;s restreint direction &#183; RGPD Art. 13</div>
<script>
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let pin='',emp=null,photo=null,stream=null,cdT=null,arT=null;
document.getElementById('addr').textContent=RESTAURANT_ADDRESS;
function uc(){const n=new Date();document.getElementById('ct').textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});document.getElementById('cd').textContent=n.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});}
uc();setInterval(uc,1000);
function ss(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}
function stopCam(){if(cdT){clearInterval(cdT);cdT=null;}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}const v=document.getElementById('video');if(v)v.srcObject=null;}
function reset(){clearTimeout(arT);arT=null;stopCam();pin='';emp=null;photo=null;document.getElementById('bc').classList.remove('r');ud();ss('idle');}
function showPin(){ss('pin');}
function pk(k){if(k==='back')pin=pin.slice(0,-1);else if(pin.length<4)pin+=k;ud();document.getElementById('bc').classList.toggle('r',pin.length===4);}
function ud(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('f',pin.length>i);}
async function cp(){
  if(pin.length!==4)return;
  const{data:m,error}=await db.rpc('verify_pin',{p_pin:pin,p_restaurant:RESTAURANT_ID});
  if(error||!m||m.length===0){pin='';ud();showErr('PIN incorrect ou salari\u00e9 non affect\u00e9 \u00e0 ce restaurant.');return;}
  emp=m[0];document.getElementById('ep').textContent=emp.prenom;ss('camera');startCam();
}
async function detectType(id){
  const today=new Date().toISOString().slice(0,10);
  const{data}=await db.from('time_entries').select('id').eq('employee_id',id).eq('manuel',false).gte('timestamp',today+'T00:00:00').lte('timestamp',today+'T23:59:59');
  return((data?.length??0)%2===0)?'entree':'sortie';
}
function startCam(){
  const v=document.getElementById('video'),ce=document.getElementById('ce'),ccc=document.getElementById('cc');
  ce.style.display='none';ccc.style.display='block';document.getElementById('cd2').textContent='3';v.srcObject=null;photo=null;
  if(!navigator.mediaDevices?.getUserMedia){ce.textContent='Camera indisponible';ce.style.display='block';ccc.style.display='none';startCd(true);return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false})
    .then(s=>{stream=s;v.srcObject=s;v.onloadedmetadata=()=>{v.play().catch(()=>{});startCd(false);};setTimeout(()=>{if(!cdT)startCd(false);},1800);})
    .catch(()=>{ce.textContent='Camera indisponible';ce.style.display='block';ccc.style.display='none';startCd(true);});
}
function startCd(np){
  if(cdT){clearInterval(cdT);cdT=null;}
  let c=3;const el=document.getElementById('cd2');el.textContent=c;
  cdT=setInterval(()=>{c--;if(c>0)el.textContent=c;else{clearInterval(cdT);cdT=null;el.textContent='\uD83D\uDCF8';setTimeout(()=>capSave(np),200);}},1000);
}
async function capSave(np){
  if(!np){const v=document.getElementById('video'),cv=document.getElementById('canvas');cv.width=v.videoWidth||320;cv.height=v.videoHeight||240;cv.getContext('2d').drawImage(v,0,0);photo=cv.toDataURL('image/jpeg',.7);}
  stopCam();
  const type=await detectType(emp.id);
  let ip='inconnu',ip_ok=false;
  try{const r=await fetch('https://api.ipify.org?format=json');const j=await r.json();ip=j.ip;const{data:res}=await db.from('restaurants').select('ip_whitelist').eq('id',RESTAURANT_ID).single();ip_ok=res?.ip_whitelist?.includes(ip)??false;}catch(e){}
  const now=new Date();
  const{error}=await db.from('time_entries').insert({employee_id:emp.id,restaurant_id:RESTAURANT_ID,type,timestamp:now.toISOString(),ip_address:ip,ip_ok,photo_b64:photo||null,manuel:false});
  if(error){showErr('Erreur enregistrement. R\u00e9essayez.');return;}
  const ie=type==='entree';
  document.getElementById('ci').className='ci '+type;document.getElementById('ci').textContent='\u2713';
  const cb=document.getElementById('cb');cb.className='cb '+type;cb.textContent=ie?'\u2197 ENTR\u00c9E':'\u2199 SORTIE';
  document.getElementById('cti').textContent=ie?'Bonne journ\u00e9e !':'\u00c0 bient\u00f4t !';
  document.getElementById('ctm').innerHTML=(ie?'Entr\u00e9e':'Sortie')+' enregistr\u00e9e \u2014 <strong>'+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'</strong>';
  document.getElementById('cna').textContent=emp.prenom+' '+emp.nom;
  ss('confirm');arT=setTimeout(reset,3500);
}
function showErr(msg){document.getElementById('em').textContent=msg;ss('error');arT=setTimeout(reset,3000);}
</script>
</body>
</html>
