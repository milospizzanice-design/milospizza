          { name:{fr:'Rhum épicé Captain Morgan 4cl',en:'Captain Morgan Spiced Rum 4cl',it:'Rum speziato Captain Morgan 4cl',de:'Captain Morgan Gewürzrum 4cl',zh:'Rhum épicé Captain Morgan 4cl',ru:'Rhum épicé Captain Morgan 4cl'}, desc:{fr:'',en:'',it:'',de:'',zh:'',ru:''}, price:'10€', photo:'' },

function loadSaved() {
  try {
    const s = localStorage.getItem('milos_v3');
    if (!s) return;
    JSON.parse(s).forEach(({sid,subcatIdx,idx,price,photo}) => {
      const sec = MENU.sections[sid];
      if (!sec) return;
      const arr = subcatIdx!==undefined ? sec.subcats[subcatIdx].items : sec.items;
      if (arr && arr[idx]) {
        if (price!==undefined) arr[idx].price = price;
        if (photo!==undefined) arr[idx].photo = photo;
      }
    });
  } catch(e){}
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('footer').textContent = T[lang].footer;
  document.getElementById('modalCloseBtn').textContent = T[lang].close;
  renderAll();
}

function renderAll() {
  const l = currentLang;
  const nav = document.getElementById('nav');
  nav.innerHTML = MENU.tabs.map((id,i) =>
    `<button onclick="showTab('${id}')" id="tab_${id}" class="${i===0?'active':''}">${TABS[l][i]}</button>`
  ).join('');

  document.getElementById('main').innerHTML = MENU.tabs.map((id,i) => {
    const s = MENU.sections[id];
    if (!s) return '';
    let html = `<div class="section ${i===0?'active':''}" id="sec_${id}">`;
    html += `<div class="section-title">${SECTION_TITLES[id][l]}</div>`;
    if (SECTION_SUBTITLES[id]) html += `<div class="section-subtitle">${SECTION_SUBTITLES[id][l]}</div>`;
    html += `<div class="divider"></div>`;
    if (s.items) s.items.forEach((item,idx) => { html += itemHTML(item,id,undefined,idx,l); });
    if (s.subcats) s.subcats.forEach((sub,si) => {
      const subName = SUBCAT_NAMES[sub.key]?.[l] || sub.key;
      const note = sub.noteKey ? (SUBCAT_NAMES[sub.noteKey]?.[l]||'') : '';
      html += `<div class="sub-cat">${subName}${note?`<span style="display:block;font-size:0.8rem;font-weight:300;font-style:italic;text-transform:none;letter-spacing:0;color:#888">${note}</span>`:''}</div>`;
      sub.items.forEach((item,idx) => { html += itemHTML(item,id,si,idx,l); });
    });
    if (s.extras) s.extras.forEach(e => {
      const t = T[l];
      if (e==='menu_enfant') html += `<div class="menu-enfant"><div class="e-title">${t.childMenu}</div><p>${t.childDesc}</p><div class="e-price">12€</div></div>`;
      if (e==='supplements') html += `<div class="supplements-box"><h3>${t.supplements}</h3><p>${t.supplementsDesc}</p><div class="sup-tags">${['Fromage','Charcuterie','Légumes','Œuf','Burrata','Mozzarella','Jambon cuit','Bresaola','Artichauts','Poivrons','Champignons'].map(x=>`<span class="sup-tag">${x}</span>`).join('')}</div><div class="sup-price">${t.from} <strong>1,5€</strong></div></div>`;
    });
    html += '</div>';
    return html;
  }).join('');
}

function itemHTML(item, sid, subcatIdx, idx, l) {
  const hasPhoto = item.photo && item.photo.trim();
  const key = `${sid}_${subcatIdx!==undefined?subcatIdx+'_':''}${idx}`;
  return `<div class="item" onclick="openModal('${key}','${l}')">
    <div class="item-info">
      <div class="item-name">${item.name[l]||item.name.fr}${hasPhoto?'<span class="photo-badge"></span>':''}</div>
      ${(item.desc[l]||item.desc.fr)?`<div class="item-desc">${item.desc[l]||item.desc.fr}</div>`:''}
    </div>
    <div class="item-price">${item.price}</div>
  </div>`;
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec_'+id)?.classList.add('active');
  const btn = document.getElementById('tab_'+id);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}); }
}

function getItem(key) {
  const parts = key.split('_');
  const sid = parts[0];
  const sec = MENU.sections[sid];
  if (!sec) return null;
  if (parts.length===3) return sec.subcats[parseInt(parts[1])].items[parseInt(parts[2])];
  return sec.items[parseInt(parts[1])];
}

function openModal(key, l) {
  const item = getItem(key);
  if (!item) return;
  const img = document.getElementById('modalImg');
  if (item.photo) { img.src=item.photo; img.className='modal-img'; img.onerror=()=>img.className='modal-img hidden'; }
  else { img.src=''; img.className='modal-img hidden'; }
  document.getElementById('modalName').textContent = item.name[l]||item.name.fr;
  document.getElementById('modalDesc').textContent = item.desc[l]||item.desc.fr;
  document.getElementById('modalPrice').textContent = item.price;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModalIfOutside(e) {
  if (e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
}

let allItems=[];
function buildAllItems() {
  allItems=[];
  MENU.tabs.forEach(id => {
    const s=MENU.sections[id];
    if (!s) return;
    if (s.items) s.items.forEach((item,idx)=>allItems.push({sid:id,subcatIdx:undefined,idx,item}));
    if (s.subcats) s.subcats.forEach((sub,si)=>sub.items.forEach((item,idx)=>allItems.push({sid:id,subcatIdx:si,idx,item,subName:sub.key})));
  });
}

function openAdmin() { buildAllItems(); renderAdminList(allItems); document.getElementById('adminOverlay').classList.add('open'); }
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }
function closeAdminIfOutside(e) { if (e.target===document.getElementById('adminOverlay')) closeAdmin(); }

function filterAdmin(q) {
  const f=q.toLowerCase();
  renderAdminList(allItems.filter(({item})=>item.name.fr.toLowerCase().includes(f)));
}

function renderAdminList(items) {
  document.getElementById('adminList').innerHTML = items.map(({sid,subcatIdx,idx,item,subName}) => {
    const uid=`${sid}_${subcatIdx!==undefined?subcatIdx+'_':''}${idx}`;
    return `<div class="admin-item">
      <div class="admin-item-name">${item.name.fr}</div>
      <label class="admin-label">Prix</label>
      <input class="admin-input" style="max-width:90px" id="p_${uid}" value="${item.price}">
      <label class="admin-label">Photo</label>
      <div class="photo-upload-row">
        <button class="photo-upload-btn" onclick="triggerUpload('${uid}')">📷 Upload</button>
        <input class="admin-input" id="ph_${uid}" value="${item.photo||''}" placeholder="ou coller un lien URL" style="flex:1">
        <img id="prev_${uid}" src="${item.photo||''}" class="photo-preview ${item.photo?'visible':''}" onerror="this.className='photo-preview'">
        <span class="upload-progress" id="prog_${uid}">Envoi...</span>
      </div>
    </div>`;
  }).join('')||'<p style="text-align:center;color:#aaa;padding:1rem;font-size:0.8rem">Aucun plat trouvé</p>';
}

function triggerUpload(uid) { currentUploadUid=uid; document.getElementById('fileInput').click(); }

async function handleFileUpload(e) {
  const file=e.target.files[0];
  if (!file||!currentUploadUid) return;
  const uid=currentUploadUid;
  const prog=document.getElementById('prog_'+uid);
  if (prog) prog.style.display='inline';
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',UPLOAD_PRESET);
  try {
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
    const data=await res.json();
    const url=data.secure_url;
    const input=document.getElementById('ph_'+uid);
    const prev=document.getElementById('prev_'+uid);
    if (input) input.value=url;
    if (prev) { prev.src=url; prev.className='photo-preview visible'; }
    if (prog) prog.style.display='none';
  } catch(err) { if (prog){prog.textContent='Erreur';prog.style.display='inline';} }
  e.target.value='';
}

function saveChanges() {
  const saved=[];
  allItems.forEach(({sid,subcatIdx,idx,item})=>{
    const uid=`${sid}_${subcatIdx!==undefined?subcatIdx+'_':''}${idx}`;
    const p=document.getElementById('p_'+uid);
    const ph=document.getElementById('ph_'+uid);
    if (!p) return;
    item.price=p.value;
    item.photo=ph?ph.value:(item.photo||'');
    saved.push({sid,subcatIdx,idx,price:item.price,photo:item.photo});
  });
  try { localStorage.setItem('milos_v3',JSON.stringify(saved)); } catch(e){}
  renderAll();
  closeAdmin();
  const t=document.getElementById('toast');
  t.textContent=T[currentLang].toast;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}


let tapCount = 0;
let tapTimer = null;
function handleLogoTap() {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
  if (tapCount >= 10) {
    tapCount = 0;
    const fab = document.getElementById('adminFab');
    fab.style.display = 'block';
    setTimeout(() => { fab.style.display = 'none'; }, 30000);
  }
}
loadSaved();
renderAll();
</script>
