function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
}

async function run() {
  log('📥 Chargement de menudata.json...');
  
  // Load current menudata
  const res = await fetch(PROXY + '?file=menudata.json');
  const data = await res.json();
  log('✅ Données chargées. SHA: ' + data.sha);
  
  // Decode
  const bin = atob(data.content.replace(/\n/g,''));
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const menu = JSON.parse(new TextDecoder('utf-8').decode(bytes));
  
  log('📝 ' + menu.items.length + ' plats trouvés');
  
  // Add ES descriptions
  let updated = 0;
  menu.items.forEach(item => {
    if (ES_DESCS[item.id]) {
      if (!item.desc) item.desc = {};
      item.desc.es = ES_DESCS[item.id];
      updated++;
    } else if (item.desc && !item.desc.es) {
      item.desc.es = item.desc.fr || '';
    }
  });
  
  log('✅ ' + updated + ' descriptions ES ajoutées');
  
  // Encode back to base64 UTF-8
  const jsonStr = JSON.stringify(menu, null, 2);
  const encBytes = new TextEncoder().encode(jsonStr);
  let binary = '';
  encBytes.forEach(b => binary += String.fromCharCode(b));
  const b64 = btoa(binary);
  
  // Save to GitHub
  log('💾 Sauvegarde sur GitHub...');
  const saveRes = await fetch(PROXY + '?file=menudata.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      message: 'Add Spanish descriptions',
      content: b64,
      sha: data.sha
    })
  });
  
  const saveData = await saveRes.json();
  if (saveData.content) {
    log('🎉 Traductions ES sauvegardées avec succès !');
    log('Rechargez le site et passez en espagnol pour vérifier.');
  } else {
    log('❌ Erreur: ' + JSON.stringify(saveData));
  }
}
