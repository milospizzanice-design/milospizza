<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mirceo · Stocks Port</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF6EC;--dark:#1A1008;--mid:#5C4A32;--light:#EDE0CC;--border:#D9C9B0;
  --ok:#27AE60;--warn:#F39C12;--alert:#E74C3C;--blue:#2980B9;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--dark);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
header{background:var(--dark);color:white;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
header h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.hrow{display:flex;align-items:center;gap:8px;margin-top:3px;}
.day-badge{font-family:'Bebas Neue',sans-serif;font-size:12px;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px;white-space:nowrap;}
.role-badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;display:none;}
#employe-display{font-size:12px;color:rgba(255,255,255,.7);flex:1;}
.btn-logout{background:rgba(255,255,255,.12);border:none;color:white;font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;}

/* ── DAY SELECTOR ── */
.day-selector{background:#2C2010;padding:6px 14px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.day-selector::-webkit-scrollbar{display:none;}
.day-btn{font-family:'Bebas Neue',sans-serif;font-size:11px;padding:4px 10px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:none;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.day-btn.active{background:white;color:var(--dark);border-color:white;}

/* ── MAIN CONTAINER ── */
.container{padding:0 0 200px;}
.section{border-bottom:2px solid var(--border);}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);position:sticky;top:80px;z-index:9;}
.sec-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;flex:1;color:white;}
.s-count{font-size:10px;background:rgba(255,255,255,.25);color:white;border-radius:20px;padding:2px 6px;display:none;font-weight:700;}
.s-count.vis{display:inline-block;}
.chev{font-size:10px;color:rgba(255,255,255,.7);transition:transform .2s;}
.sec-hdr.coll .chev{transform:rotate(-90deg);}
.sec-body.coll{display:none;}
.sub-label{padding:5px 14px 3px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mid);background:#F5EFE6;font-weight:600;border-bottom:1px solid var(--border);}

/* ── PRODUCT ROW ── */
.prow{background:white;border-bottom:1px solid rgba(217,201,176,.35);padding:8px 12px;display:flex;align-items:center;gap:8px;transition:background .15s;}
.prow.s-ok{background:white;}
.prow.s-warn{background:#FFFBF0;}
.prow.s-order{background:#FFF4F3;}
.sup-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:13px;font-weight:500;line-height:1.2;}
.pmeta{font-size:10px;color:var(--mid);margin-top:1px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.sup-tag{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:10px;color:white;}
.pwrap{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;min-width:50px;text-align:center;}
.p-ok{background:#E8F5E9;color:#1E8449;}
.p-warn{background:#FEF9E7;color:#D68910;}
.p-order{background:#FDEDEC;color:#C0392B;}

/* ── CONTROLS ── */
.qty-ctrl{display:flex;align-items:center;background:var(--cream);border:1.5px solid var(--border);border-radius:9px;overflow:hidden;}
.qbtn{width:28px;height:30px;background:none;border:none;font-size:15px;color:var(--mid);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--light);}
.qin{width:38px;text-align:center;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--dark);-moz-appearance:textfield;padding:0;}
.qin::-webkit-outer-spin-button,.qin::-webkit-inner-spin-button{-webkit-appearance:none;}
.two-tog{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;flex-shrink:0;}
.tbtn{padding:6px 9px;background:var(--cream);border:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--mid);}
.tbtn:first-child{border-right:1px solid var(--border);}
.t-ok{background:#E8F5E9;color:#1E8449;}
.t-cmd{background:#FDEDEC;color:#C0392B;}
.lvl-tog{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;flex-shrink:0;}
.lbtn{padding:5px 7px;background:var(--cream);border:none;font-size:10px;font-weight:600;cursor:pointer;color:var(--mid);border-right:1px solid var(--border);}
.lbtn:last-child{border-right:none;}
.lv-ok{background:#E8F5E9;color:#1E8449;}
.lv-low{background:#FEF9E7;color:#D68910;}
.lv-out{background:#FDEDEC;color:#C0392B;}
.yn-tog{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;flex-shrink:0;}
.ybtn{padding:6px 9px;background:var(--cream);border:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--mid);}
.ybtn:first-child{border-right:1px solid var(--border);}
.y-ok{background:#E8F5E9;color:#1E8449;}
.y-cmd{background:#FDEDEC;color:#C0392B;}
.rup-tog{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;flex-shrink:0;}
.rbtn{padding:5px 7px;background:var(--cream);border:none;font-size:10px;font-weight:600;cursor:pointer;color:var(--mid);border-right:1px solid var(--border);}
.rbtn:last-child{border-right:none;}
.r-ok{background:#E8F5E9;color:#1E8449;}
.r-low{background:#FEF9E7;color:#D68910;}
.r-rup{background:#922B21;color:white;}

/* ── FOOTER ── */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:white;border-top:2px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.12);padding:8px 12px 10px;}
.ftitle{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mid);font-weight:600;margin-bottom:5px;}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.dbtn{border:none;border-radius:8px;padding:7px 2px 5px;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:.5px;color:white;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.3;transition:opacity .2s,transform .1s;}
.dbtn.act{opacity:1;}
.dbtn:active{transform:scale(.95);}
.dc{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;background:rgba(255,255,255,.3);border-radius:20px;padding:1px 5px;}
.dbtn-all{background:#25D366;grid-column:span 4;flex-direction:row;justify-content:center;gap:6px;font-size:13px;padding:9px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;padding:20px 16px 28px;width:100%;max-width:520px;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;margin-bottom:8px;}
.mrecap{background:var(--cream);border-radius:12px;padding:10px 13px;font-size:12px;line-height:1.9;max-height:220px;overflow-y:auto;margin-bottom:10px;border:1px solid var(--border);}
.rsup{font-weight:700;font-size:10px;text-transform:uppercase;margin-top:4px;letter-spacing:.5px;}
.rorder{color:#C0392B;}.rwarn{color:#D68910;}
.wa-tip{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:9px;padding:7px 11px;font-size:11px;color:#2E7D32;margin-bottom:10px;}
.mactions{display:flex;gap:8px;}
.btn-cancel{flex:1;background:var(--light);color:var(--mid);border:none;border-radius:11px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-wa{flex:2;background:#25D366;color:white;border:none;border-radius:11px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;}

/* ── PIN SCREEN ── */
#pin-screen{position:fixed;inset:0;background:var(--cream);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;}
.pin-logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--dark);text-align:center;}
.pin-sub{font-size:12px;color:var(--mid);text-align:center;margin-top:4px;margin-bottom:24px;text-transform:uppercase;letter-spacing:1px;}
.pin-card{background:white;border-radius:18px;padding:22px 20px;width:100%;max-width:320px;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.pin-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;color:var(--mid);text-align:center;margin-bottom:14px;}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:18px;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:var(--cream);transition:background .15s;}
.pdot.filled{background:var(--dark);border-color:var(--dark);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.pkey{background:var(--cream);border:1.5px solid var(--border);border-radius:11px;padding:14px;font-family:'DM Sans',sans-serif;font-size:20px;font-weight:600;color:var(--dark);cursor:pointer;}
.pkey:active{background:var(--light);}
.pkey-clear{color:#C0392B;font-size:13px;}
.pkey-del{font-size:15px;}
.pin-error{text-align:center;color:#C0392B;font-size:11px;font-weight:600;margin-top:10px;min-height:16px;}

/* ── ADMIN SCREEN ── */
#admin-screen{position:fixed;inset:0;background:var(--cream);z-index:500;display:none;flex-direction:column;overflow:hidden;}
.admin-header{background:var(--dark);color:white;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.admin-header h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;flex:1;}
.admin-tabs{display:flex;background:#2C2010;padding:0 14px;gap:0;flex-shrink:0;}
.atab{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:10px 14px;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;}
.atab.active{color:white;border-bottom-color:white;}
.admin-body{flex:1;overflow-y:auto;padding:14px;}

/* Admin cards */
.acard{background:white;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.acard-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--dark);margin-bottom:10px;}
.arow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(217,201,176,.3);}
.arow:last-child{border:none;padding-bottom:0;}
.arow-info{flex:1;font-size:12px;font-weight:500;}
.arow-sub{font-size:10px;color:var(--mid);}
.ainput{border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;background:var(--cream);color:var(--dark);}
.ainput:focus{outline:none;border-color:var(--dark);}
.ainput-w52{width:52px;text-align:center;}
.ainput-w70{width:70px;text-align:center;letter-spacing:3px;font-size:16px;}
.ainput-w120{width:120px;}
.ainput-full{width:100%;}
.aselect{border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--cream);color:var(--dark);}
.aselect:focus{outline:none;}
.abtn{border:none;border-radius:9px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.abtn-primary{background:var(--dark);color:white;}
.abtn-danger{background:#FDEDEC;color:#C0392B;border:1px solid #C0392B;}
.abtn-success{background:#E8F5E9;color:#1E8449;border:1px solid #27AE60;}
.abtn-ghost{background:var(--light);color:var(--mid);}
.add-btn{width:100%;background:#F0F7FF;border:1.5px dashed #2980B9;border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#2980B9;cursor:pointer;margin-top:8px;}
.cat-section{margin-bottom:16px;}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--mid);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.color-dot-pick{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;}

/* Drag & drop */
.draggable{cursor:grab;}
.draggable.dragging{opacity:.4;}
.drag-over{border-top:2px solid var(--blue);}

/* Tags jours */
.day-tags{display:flex;gap:4px;flex-wrap:wrap;}
.dtag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);background:var(--cream);color:var(--mid);}
.dtag.on{background:var(--dark);color:white;border-color:var(--dark);}

.hidden{display:none!important;}
.col-swatch{width:20px;height:20px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>

<header>
  <h1>🍕 Mirceo · Stocks Port</h1>
  <div class="hrow">
    <span class="day-badge" id="day-badge">—</span>
    <span id="role-badge" class="role-badge"></span>
    <span id="employe-display"></span>
    <button class="btn-logout" onclick="logout()">⏻ Quitter</button>
  </div>
</header>
<div class="day-selector">
  <button class="day-btn" onclick="setDay(1)">Lun</button>
  <button class="day-btn" onclick="setDay(2)">Mar</button>
  <button class="day-btn" onclick="setDay(3)">Mer</button>
  <button class="day-btn" onclick="setDay(4)">Jeu</button>
  <button class="day-btn" onclick="setDay(5)">Ven</button>
  <button class="day-btn" onclick="setDay(6)">Sam</button>
  <button class="day-btn" onclick="setDay(0)">Dim</button>
</div>
<div class="container" id="container"></div>

<!-- FOOTER -->
<div class="sticky-footer" id="footer" style="display:none">
  <div class="ftitle">📤 Dispatcher les commandes</div>
  <div class="dgrid" id="dgrid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal">
    <h3 id="mtitle">—</h3>
    <div class="mrecap" id="mrecap"></div>
    <div class="wa-tip">📱 WhatsApp : sélectionne <strong id="wtarget">—</strong> et envoie.</div>
    <div class="mactions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-wa" onclick="sendCurrent()">📤 OUVRIR WHATSAPP</button>
    </div>
  </div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">🍕 MIRCEO</div>
  <div class="pin-sub">Gestion des stocks · Port</div>
  <div class="pin-card">
    <div class="pin-title">ENTREZ VOTRE CODE PIN</div>
    <div class="pin-dots">
      <div class="pdot" id="pd1"></div><div class="pdot" id="pd2"></div>
      <div class="pdot" id="pd3"></div><div class="pdot" id="pd4"></div>
    </div>
    <div class="pin-grid">
      <button class="pkey" onclick="pk('1')">1</button><button class="pkey" onclick="pk('2')">2</button><button class="pkey" onclick="pk('3')">3</button>
      <button class="pkey" onclick="pk('4')">4</button><button class="pkey" onclick="pk('5')">5</button><button class="pkey" onclick="pk('6')">6</button>
      <button class="pkey" onclick="pk('7')">7</button><button class="pkey" onclick="pk('8')">8</button><button class="pkey" onclick="pk('9')">9</button>
      <button class="pkey pkey-clear" onclick="pClear()">✕</button><button class="pkey" onclick="pk('0')">0</button><button class="pkey pkey-del" onclick="pDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <div class="admin-header">
    <h2>⚙️ Admin · Mirceo</h2>
    <button class="abtn abtn-ghost" onclick="closeAdmin()">✕ Fermer</button>
  </div>
  <div class="admin-tabs">
    <div class="atab active" id="tab-produits" onclick="showTab('produits')">📦 Produits</div>
    <div class="atab" id="tab-fournisseurs" onclick="showTab('fournisseurs')">🚚 Fournisseurs</div>
    <div class="atab" id="tab-acces" onclick="showTab('acces')">🔐 Accès</div>
    <div class="atab" id="tab-config" onclick="showTab('config')">⚙️ Config</div>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

const DAYS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAY_SHORT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const DAY_ORDER = [1,2,3,4,5,6,0];
let currentDay = new Date().getDay();
let currentUser = null;
let pinBuffer = '';
let STATE = {};
let currentSup = null;
let adminTab = 'produits';

function effectiveDay(){
  // Tient compte de l'heure de début de journée (dayStart) du restaurant
  // Si on est après minuit mais avant dayEnd → on considère encore le jour précédent
  const now = new Date();
  const h = now.getHours();
  // Global dayEnd (heure fin de journée) = 5h par défaut
  const dayEnd = 5;
  if(h < dayEnd){
    const d = new Date(now); d.setDate(d.getDate()-1);
    return d.getDay();
  }
  return now.getDay();
}

function supActive(supId){
  const sup = DB.suppliers[supId];
  if(!sup) return false;
  const d = currentDay;
  const now = new Date();
  const h = now.getHours();
  // Si heure avant dayEnd, on est encore "hier"
  return sup.days.includes(d);
}

function catAllowed(catId){
  if(!currentUser) return false;
  return currentUser.cats.includes(catId);
}

function catVisible(cat){
  return cat.products && DB.products.some(p=>{
    if(p.cat!==cat.id) return false;
    if(p.monthlyOnly && !isLastSunday()) return false;
    return supActive(p.sup);
  });
}

function isLastSunday(){
  const now=new Date();
  return now.getDay()===0 && (new Date(now.getFullYear(),now.getMonth()+1,0).getDate()-now.getDate())<7;
}

function getS(p){
  const o=DB.overrides[p.id];
  if(o?.sDay && o.sDay[currentDay]!==undefined) return o.sDay[currentDay];
  if(p.s && p.s[currentDay]!==undefined) return p.s[currentDay];
  if(o?.sDefault!==undefined) return o.sDefault;
  return p.sDefault??1;
}
function getC(p){
  const o=DB.overrides[p.id];
  if(o?.cDay && o.cDay[currentDay]!==undefined) return o.cDay[currentDay];
  if(p.c && p.c[currentDay]!==undefined) return p.c[currentDay];
  if(o?.cDefault!==undefined) return o.cDefault;
  return p.cDefault??p.sDefault??1;
}
function getColisQty(p){ return DB.overrides[p.id]?.colisQty ?? p.colisQty ?? 1; }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function san(s){ return (s||'').replace(/[^a-zA-Z0-9]/g,'_'); }

function pk(k){
  if(pinBuffer.length>=4)return;
  pinBuffer+=k; updDots();
  if(pinBuffer.length===4)setTimeout(checkPin,150);
}
function pDel(){ pinBuffer=pinBuffer.slice(0,-1); updDots(); document.getElementById('pin-error').textContent=''; }
function pClear(){ pinBuffer=''; updDots(); document.getElementById('pin-error').textContent=''; }
function updDots(){ for(let i=1;i<=4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<=pinBuffer.length); }

function checkPin(){
  if(pinBuffer===ADMIN_PIN){
    pinBuffer=''; updDots();
    document.getElementById('pin-screen').style.display='none';
    openAdmin(); return;
  }
  const user = DB.users[pinBuffer];
  if(user){
    currentUser=user;
    document.getElementById('pin-screen').style.display='none';
    const rb=document.getElementById('role-badge');
    rb.textContent=user.name; rb.style.background='#444'; rb.style.color='white'; rb.style.display='inline-block';

}

function logout(){

function setDay(d){

  document.getElementById('day-badge').textContent=DAYS_FR[d];
  if(!currentUser)return;
  renderAll();

function renderAll(){
  const container=document.getElementById('container');
  container.innerHTML='';

  DB.cats.forEach(cat=>{
    if(!catAllowed(cat.id)) return;
    const catProds=DB.products.filter(p=>{
      if(p.cat!==cat.id) return false;
      if(p.monthlyOnly&&!isLastSunday()) return false;
      return supActive(p.sup);
    });
    if(!catProds.length) return;

    const sec=document.createElement('div');
    sec.className='section';
    const hdr=document.createElement('div');
    hdr.className='sec-hdr';
    hdr.style.background=cat.color||'#555';
    hdr.onclick=()=>toggleSec(hdr);
    hdr.innerHTML=`<h2>${cat.label}</h2><span class="s-count" id="sc-${san(cat.id)}">0</span><span class="chev">▼</span>`;
    sec.appendChild(hdr);

    const body=document.createElement('div');
    body.className='sec-body';

    // Grouper par sous-catégorie
    const subMap={};
    catProds.forEach(p=>{ const k=p.sub||''; if(!subMap[k])subMap[k]=[]; subMap[k].push(p); });

    // Ordonner selon cat.subcats
    const subOrder=(cat.subcats||[]).map(s=>s.id);
    const allSubs=Object.keys(subMap);
    const ordered=[...subOrder.filter(s=>allSubs.includes(s)), ...allSubs.filter(s=>!subOrder.includes(s))];

    ordered.forEach(subId=>{
      const prods=subMap[subId];
      if(!prods?.length) return;
      const subDef=(cat.subcats||[]).find(s=>s.id===subId);
      if(subDef&&cat.subcats?.length>1){
        const lbl=document.createElement('div');
        lbl.className='sub-label'; lbl.textContent=subDef.label;
        body.appendChild(lbl);
      }
      prods.forEach(p=>body.appendChild(buildRow(p)));
    });

    sec.appendChild(body);
    container.appendChild(sec);
  });

  renderDispatch();
  recalc();
}

function buildRow(p){
  const sup=DB.suppliers[p.sup];
  const color=sup?.color||'#999';
  const s=getS(p), c=getC(p), colis=getColisQty(p);

  let ctrl='', meta='';

  if(p.type==='qty'){
    const colisLabel=colis>1?` · colis de ${colis}`:' · à l\'unité';
    meta=`Seuil:${s} · Cible:${c}${colisLabel}`;
    const v=STATE[p.id]??0;
    ctrl=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <div class="qty-ctrl"><button class="qbtn" onclick="adjP('${p.id}',-1)">−</button><input class="qin" id="si-${p.id}" type="number" value="${v}" min="0" oninput="onIn('${p.id}')"><button class="qbtn" onclick="adjP('${p.id}',1)">+</button></div>
      <div style="font-size:9px;color:var(--mid)">En stock</div>
    </div><span class="pill" id="pi-${p.id}">—</span>`;
  } else if(p.type==='two'){
    const thresh=p.levelType==='half'?'½':p.levelType==='third'?'⅓':'¾';
    meta=`Commander si < ${thresh}`;
    const v=STATE[p.id]??'ok';
    ctrl=`<div class="two-tog"><button class="tbtn${v==='ok'?' t-ok':''}" onclick="setTwo('${p.id}','ok')">≥${thresh}</button><button class="tbtn${v==='cmd'?' t-cmd':''}" onclick="setTwo('${p.id}','cmd')"><${thresh} Cmd</button></div><span class="pill" id="pi-${p.id}">—</span>`;
  } else if(p.type==='level'){
    const lt=p.levelType;
    const thresh=lt==='half'?'½':lt==='third'?'⅓':lt==='twothird'?'⅔':'¾';
    meta=`Commander si < ${thresh}`;
    const v=STATE[p.id]??'ok';
    ctrl=`<div class="lvl-tog"><button class="lbtn${v==='ok'?' lv-ok':''}" onclick="setLvl('${p.id}','ok')">OK</button><button class="lbtn${v==='low'?' lv-low':''}" onclick="setLvl('${p.id}','low')">≤${thresh}</button><button class="lbtn${v==='out'?' lv-out':''}" onclick="setLvl('${p.id}','out')">Vide</button></div><span class="pill" id="pi-${p.id}">—</span>`;
  } else if(p.type==='yn'){
    meta=p.monthlyOnly?'Rappel mensuel':'Commander si absent';
    const v=STATE[p.id]??'oui';
    ctrl=`<div class="yn-tog"><button class="ybtn${v==='oui'?' y-ok':''}" onclick="setYN('${p.id}','oui')">✓ OK</button><button class="ybtn${v==='non'?' y-cmd':''}" onclick="setYN('${p.id}','non')">✗ Cmd</button></div>`;
  } else if(p.type==='rupture'){
    meta='Dabray · Stock bas ou rupture';
    const v=STATE[p.id]??'ok';
    ctrl=`<div class="rup-tog"><button class="rbtn${v==='ok'?' r-ok':''}" onclick="setRup('${p.id}','ok')">✓ OK</button><button class="rbtn${v==='low'?' r-low':''}" onclick="setRup('${p.id}','low')">Bas</button><button class="rbtn${v==='rup'?' r-rup':''}" onclick="setRup('${p.id}','rup')">🔴 Rupt.</button></div>`;
  }

  const row=document.createElement('div');
  row.className='prow'; row.id='row-'+san(p.id); row.dataset.id=p.id; row.dataset.sup=p.sup;
  row.innerHTML=`
    <div class="sup-dot" style="background:${color}"></div>
    <div class="pinfo">
      <div class="pname">${p.name}</div>
      <div class="pmeta"><span class="sup-tag" style="background:${color}">${(sup?.name||p.sup).split('→')[0].trim().split(' ')[0]}</span>${p.unit&&p.unit!=='—'?'· '+p.unit:''}${meta?' · '+meta:''}</div>
    </div>
    <div class="pwrap">${ctrl}</div>`;
  return row;
}

function adjP(id,d){const el=document.getElementById('si-'+id);if(!el)return;el.value=Math.max(0,parseFloat(el.value||0)+d);STATE[id]=parseFloat(el.value);recalc();}
function onIn(id){const el=document.getElementById('si-'+id);if(el)STATE[id]=parseFloat(el.value||0);recalc();}
function setTwo(id,v){STATE[id]=v;const r=document.getElementById('row-'+san(id));if(r){r.querySelectorAll('.tbtn').forEach((b,i)=>b.className='tbtn'+(i===0&&v==='ok'?' t-ok':i===1&&v==='cmd'?' t-cmd':''));}recalc();}
function setLvl(id,v){STATE[id]=v;const r=document.getElementById('row-'+san(id));if(r){const bs=r.querySelectorAll('.lbtn');bs[0].className='lbtn'+(v==='ok'?' lv-ok':'');bs[1].className='lbtn'+(v==='low'?' lv-low':'');bs[2].className='lbtn'+(v==='out'?' lv-out':'');}recalc();}
function setYN(id,v){STATE[id]=v;const r=document.getElementById('row-'+san(id));if(r){const bs=r.querySelectorAll('.ybtn');bs[0].className='ybtn'+(v==='oui'?' y-ok':'');bs[1].className='ybtn'+(v==='non'?' y-cmd':'');}recalc();}
function setRup(id,v){STATE[id]=v;const r=document.getElementById('row-'+san(id));if(r){const bs=r.querySelectorAll('.rbtn');bs[0].className='rbtn'+(v==='ok'?' r-ok':'');bs[1].className='rbtn'+(v==='low'?' r-low':'');bs[2].className='rbtn'+(v==='rup'?' r-rup':'');}recalc();}

// ══════════════════════════════════════════════════════
// STATUT & RECALCUL
// ══════════════════════════════════════════════════════
function getStatus(p){
  const v=STATE[p.id];
  if(p.type==='qty'){
    const stock=parseFloat(v??0), s=getS(p), c=getC(p), colis=getColisQty(p);
    if(stock<s){
      const diff=c-stock;
      const n=Math.ceil(diff/colis);
      const label=colis>1?`${n} colis de ${colis} ${p.unit}`:`Cmd ${diff} ${p.unit}`;
      return{order:true,label};
    }
    if(stock<=s*1.3)return{warn:true,label:'Stock bas'};
    return{ok:true,label:'✓ OK'};
  }
  if(p.type==='two'){const cur=v??'ok';return cur==='cmd'?{order:true,label:'Commander'}:{ok:true,label:'✓ OK'};}
  if(p.type==='level'){const cur=v??'ok';if(cur==='out'||cur==='low')return{order:true,label:'Commander'};return{ok:true,label:'✓ OK'};}
  if(p.type==='yn'){return(v??'oui')==='non'?{order:true,label:'Commander'}:{ok:true,label:'✓ OK'};}
  if(p.type==='rupture'){
    const cur=v??'ok';
    if(cur==='rup')return{rupture:true,label:'🔴 RUPTURE'};
    if(cur==='low')return{warn:true,label:'Stock bas'};
    return{ok:true,label:'✓ OK'};
  }
  return{ok:true,label:'✓ OK'};
}

function recalc(){
  const counts={};Object.keys(DB.suppliers).forEach(s=>counts[s]=0);
  const triggered={};Object.keys(DB.suppliers).forEach(s=>triggered[s]=false);

  DB.products.forEach(p=>{
    const row=document.getElementById('row-'+san(p.id));if(!row)return;
    const st=getStatus(p);
    if(st.order||st.rupture)triggered[p.sup]=true;
  });

  DB.products.forEach(p=>{
    const row=document.getElementById('row-'+san(p.id));if(!row)return;
    let st=getStatus(p);
    if(triggered[p.sup]&&!st.order&&!st.rupture&&p.type==='qty'){
      const stock=parseFloat(STATE[p.id]??0),c=getC(p),colis=getColisQty(p);
      if(stock<c){const diff=c-stock;const n=Math.ceil(diff/colis);const label=colis>1?`${n} colis de ${colis} ${p.unit}`:`Cmd ${diff} ${p.unit}`;st={order:true,label};}
    }
    row.className='prow'+(st.order||st.rupture?' s-order':st.warn?' s-warn':' s-ok');
    const pill=document.getElementById('pi-'+p.id);
    if(pill){pill.textContent=st.label||'✓ OK';pill.className='pill '+(st.rupture?'p-order':st.order?'p-order':st.warn?'p-warn':'p-ok');}
    if(st.order)counts[p.sup]++;
    if(st.rupture){counts[p.sup]++;if(p.metroFallback)counts['metro']=(counts['metro']||0)+1;}
  });

  DB.cats.forEach(cat=>{
    const sc=document.getElementById('sc-'+san(cat.id));if(!sc)return;
    let n=0;DB.products.filter(p=>p.cat===cat.id).forEach(p=>{const pill=document.getElementById('pi-'+p.id);if(pill&&pill.classList.contains('p-order'))n++;});
    sc.textContent=n;sc.classList.toggle('vis',n>0);
  });

  let total=0;
  Object.keys(DB.suppliers).forEach(sup=>{
    const dc=document.getElementById('dc-'+sup);if(dc)dc.textContent=counts[sup]||0;
    const dbtn=document.getElementById('dbtn-'+sup);if(dbtn)dbtn.classList.toggle('act',(counts[sup]||0)>0);
    total+=counts[sup]||0;
  });
  const dcAll=document.getElementById('dc-all');if(dcAll)dcAll.textContent=total+' art.';
  const dAll=document.getElementById('dbtn-all');if(dAll)dAll.classList.toggle('act',total>0);
}

function buildRecap(sup){
  let html='';
  const prods=sup==='all'?DB.products:DB.products.filter(p=>p.sup===sup);
  let lastSup='';
  prods.forEach(p=>{
    const row=document.getElementById('row-'+san(p.id));if(!row)return;
    const pill=document.getElementById('pi-'+p.id);if(!pill||!pill.classList.contains('p-order'))return;
    if(sup==='all'&&p.sup!==lastSup){html+=`<div class="rsup" style="color:${DB.suppliers[p.sup]?.color}">${DB.suppliers[p.sup]?.name||p.sup}</div>`;lastSup=p.sup;}
    html+=`<span class="rorder">● ${p.name}</span> → <strong>${pill.textContent}</strong><br>`;
  });
  if((sup==='metro'||sup==='all')){
    const rups=DB.products.filter(p=>p.sup==='dabray'&&p.metroFallback&&(STATE[p.id]??'ok')==='rup');
    if(rups.length){html+=`<div class="rsup" style="color:#922B21">⚡ Ruptures Dabray → Metro</div>`;rups.forEach(p=>html+=`<span class="rorder">● ${p.name}</span> → prévoir<br>`);}
  }
  // Ruptures via fournisseurs custom viaDabray
  Object.entries(DB.suppliers).filter(([id,s])=>s.viaDabray&&id!=='metro'&&(sup==='all'||sup===id)).forEach(([supId,s])=>{
    const supProds=DB.products.filter(p=>p.sup===supId);
    const rups=supProds.filter(p=>(STATE[p.id]??'ok')==='rup'||(STATE[p.id]??'ok')==='low');
    if(rups.length){html+=`<div class="rsup" style="color:${s.color}">⚡ Ruptures → ${s.name} (via Dabray)</div>`;rups.forEach(p=>html+=`<span class="rorder">● ${p.name}</span> → prévoir<br>`);}
  });
  return html||'<em style="color:#999">Aucune commande</em>';
}

function buildWA(sup){
  const emp=currentUser?.name||'—';
  const date=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const isVia=sup!=='all'&&(DB.suppliers[sup]?.viaDabray||['carrefour','pelleor','cash','idpro','truffe'].includes(sup));
  let msg=isVia?`🛒 COMMANDE ${(DB.suppliers[sup]?.name||sup).split('→')[0].trim().toUpperCase()}\n👤 ${emp} · 📅 ${date}\nDabray, merci de prévoir :\n─────────────────────\n`:`📋 COMMANDE ${(DB.suppliers[sup]?.name||sup).toUpperCase()}\n👤 ${emp} · 📅 ${date}\n─────────────────────\n`;
  const prods=sup==='all'?DB.products:DB.products.filter(p=>p.sup===sup);
  let lastSup='',hasLines=false;
  prods.forEach(p=>{
    const pill=document.getElementById('pi-'+p.id);if(!pill||!pill.classList.contains('p-order'))return;
    if(sup==='all'&&p.sup!==lastSup){msg+=`\n▶ ${DB.suppliers[p.sup]?.name?.toUpperCase()||p.sup}\n`;lastSup=p.sup;}
    msg+=`  • ${p.name} → ${pill.textContent}\n`;hasLines=true;
  });
  if((sup==='metro'||sup==='all')){
    const rups=DB.products.filter(p=>p.sup==='dabray'&&p.metroFallback&&(STATE[p.id]??'ok')==='rup');
    if(rups.length){msg+=`\n⚡ RUPTURES DABRAY → Metro :\n`;rups.forEach(p=>{msg+=`  • ${p.name} → prévoir\n`;hasLines=true;});}
  }
  if(!hasLines)msg+='  Aucune commande\n';
  return msg+`─────────────────────\nMirceo · Port`;
}

function openModal(sup){
  currentSup=sup;
  const info=sup==='all'?{name:'Toutes les commandes',color:'#25D366'}:DB.suppliers[sup];
  document.getElementById('mtitle').textContent=sup==='all'?'Résumé global':info?.name||sup;
  document.getElementById('wtarget').textContent=sup==='all'?'chaque fournisseur':(info?.wa||info?.name||sup);
  document.getElementById('mrecap').innerHTML=buildRecap(sup);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOut(e){if(e.target.id==='modal')closeModal();}

function sendCurrent(){
  if(currentSup==='all'){
    const sups=Object.keys(DB.suppliers).filter(s=>supActive(s)||(s==='metro'&&supActive('dabray')));
    sups.forEach((s,i)=>{const txt=buildWA(s);if(txt.includes('●')||txt.includes('→ prévoir'))setTimeout(()=>window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank'),i*700);});
  } else {
    window.open(`https://wa.me/?text=${encodeURIComponent(buildWA(currentSup))}`, '_blank');
  }
  closeModal();
}

function openAdmin(){
  document.getElementById('admin-screen').style.display='flex';
  showTab('produits');
}
function closeAdmin(){
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
}

function showTab(tab){
  adminTab=tab;
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  const body=document.getElementById('admin-body');
  if(tab==='produits')renderAdminProduits(body);
  else if(tab==='fournisseurs')renderAdminFournisseurs(body);
  else if(tab==='acces')renderAdminAcces(body);
  else if(tab==='config')renderAdminConfig(body);
}

// ── Onglet Produits ──
function renderAdminProduits(body){
  body.innerHTML='';
  // Bouton ajouter produit
  const addCard=document.createElement('div');
  addCard.className='acard';
  addCard.innerHTML=`<div class="acard-title">➕ Ajouter un produit</div>
    <div class="arow"><div class="arow-info">Nom du produit</div><input class="ainput ainput-w120" id="new-pname" placeholder="Ex: Burrata"></div>
    <div class="arow"><div class="arow-info">Catégorie</div>
      <select class="aselect" id="new-pcat">${DB.cats.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select></div>
    <div class="arow"><div class="arow-info">Sous-catégorie</div>
      <select class="aselect" id="new-psub"><option value="">— aucune —</option></select></div>
    <div class="arow"><div class="arow-info">Fournisseur</div>
      <select class="aselect" id="new-psup">${Object.entries(DB.suppliers).map(([id,s])=>`<option value="${id}">${s.name}</option>`).join('')}</select></div>
    <div class="arow"><div class="arow-info">Unité</div><input class="ainput ainput-w120" id="new-punit" placeholder="bouteille, bac..."></div>
    <div class="arow"><div class="arow-info">Type de contrôle</div>
      <select class="aselect" id="new-ptype">
        <option value="qty">Quantité (seuil/cible)</option>
        <option value="two">Niveau ½</option>
        <option value="level">Niveau ⅓/⅔/¾</option>
        <option value="yn">Oui / Non</option>
        <option value="rupture">Rupture Dabray</option>
      </select></div>
    <div id="new-qty-fields">
      <div class="arow"><div class="arow-info">Seuil</div><input class="ainput ainput-w52" id="new-ps" type="number" value="1" step="0.5" min="0"></div>
      <div class="arow"><div class="arow-info">Cible</div><input class="ainput ainput-w52" id="new-pc" type="number" value="1" step="0.5" min="0"></div>
      <div class="arow"><div class="arow-info">Colis de</div><input class="ainput ainput-w52" id="new-pcolis" type="number" value="1" step="1" min="1"></div>
    </div>
    <button class="abtn abtn-primary add-btn" onclick="addProduct()" style="margin-top:10px;">+ Ajouter ce produit</button>`;
  body.appendChild(addCard);

  // Mise à jour sous-cats selon catégorie
  const catSel=addCard.querySelector('#new-pcat');
  const subSel=addCard.querySelector('#new-psub');
  const typeSel=addCard.querySelector('#new-ptype');
  const qtyFields=addCard.querySelector('#new-qty-fields');
  catSel.addEventListener('change',()=>updateSubcatSelect(catSel.value,subSel));
  typeSel.addEventListener('change',()=>{ qtyFields.style.display=typeSel.value==='qty'?'':'none'; });
  updateSubcatSelect(catSel.value,subSel);

  // Liste produits existants par catégorie
  DB.cats.forEach(cat=>{
    const catProds=DB.products.filter(p=>p.cat===cat.id);
    if(!catProds.length)return;
    const card=document.createElement('div');
    card.className='acard';
    card.innerHTML=`<div class="acard-title">${cat.label}</div>`;

    catProds.forEach(p=>{
      const o=DB.overrides[p.id]||{};
      const sVal=o.sDefault??p.sDefault??1;
      const cVal=o.cDefault??p.cDefault??1;
      const colisVal=o.colisQty??p.colisQty??1;
      const sup=DB.suppliers[p.sup];
      const row=document.createElement('div');
      row.className='arow'; row.style.flexWrap='wrap'; row.style.gap='6px';
      row.innerHTML=`
        <div class="arow-info" style="flex:1;min-width:120px;">
          <input class="ainput" style="width:100%;margin-bottom:4px;font-size:12px;" value="${p.name}" 
            onchange="changeProdName('${p.id}',this.value)">
          <div class="arow-sub">
            <select class="aselect" style="font-size:10px;" onchange="changeSup('${p.id}',this.value)">
              ${Object.entries(DB.suppliers).map(([id,s])=>`<option value="${id}"${id===p.sup?' selected':''}>${s.name}</option>`).join('')}
            </select>
          </div>
        </div>
        ${p.type==='qty'?`
        <div style="text-align:center"><div style="font-size:9px;color:var(--mid)">Seuil</div>
          <input class="ainput ainput-w52" type="number" value="${sVal}" step="0.5" min="0" onchange="saveOvr('${p.id}','s',this.value)"></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--mid)">Cible</div>
          <input class="ainput ainput-w52" type="number" value="${cVal}" step="0.5" min="0" onchange="saveOvr('${p.id}','c',this.value)"></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--mid)">Colis</div>
          <input class="ainput ainput-w52" type="number" value="${colisVal}" step="1" min="1" onchange="saveOvr('${p.id}','colis',this.value)"></div>
        `:''}
        <button class="abtn abtn-danger" style="padding:5px 8px;font-size:11px;" onclick="deleteProduct('${p.id}')">✕</button>`;
      card.appendChild(row);
    });
    body.appendChild(card);
  });
}

function updateSubcatSelect(catId, sel){
  const cat=DB.cats.find(c=>c.id===catId);
  sel.innerHTML='<option value="">— aucune —</option>';
  (cat?.subcats||[]).forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.label}</option>`);
}

function addProduct(){
  const name=document.getElementById('new-pname').value.trim();
  const cat=document.getElementById('new-pcat').value;
  const sub=document.getElementById('new-psub').value;
  const sup=document.getElementById('new-psup').value;
  const unit=document.getElementById('new-punit').value.trim();
  const type=document.getElementById('new-ptype').value;
  const s=parseFloat(document.getElementById('new-ps').value)||1;
  const c=parseFloat(document.getElementById('new-pc').value)||1;
  const colis=parseInt(document.getElementById('new-pcolis').value)||1;
  if(!name){alert('Nom obligatoire.');return;}
  const id='p-'+uid();
  const prod={id,cat,sub,sup,name,unit:unit||'—',type};
  if(type==='qty'){prod.sDefault=s;prod.cDefault=c;prod.colisQty=colis;}
  DB.products.push(prod);
  saveDB();
  showTab('produits');
}

function deleteProduct(id){
  if(!confirm('Supprimer ce produit ?'))return;
  DB.products=DB.products.filter(p=>p.id!==id);
  delete DB.overrides[id];
  saveDB();
  showTab('produits');
}

function changeProdName(id,name){
  const p=DB.products.find(p=>p.id===id);
  if(p&&name.trim()){p.name=name.trim();saveDB();}
}
function changeSup(id,supId){
  const p=DB.products.find(p=>p.id===id);
  if(p){p.sup=supId;saveDB();}
}

function saveOvr(id,type,val){
  if(!DB.overrides[id])DB.overrides[id]={};
  if(type==='s')DB.overrides[id].sDefault=parseFloat(val);
  if(type==='c')DB.overrides[id].cDefault=parseFloat(val);
  if(type==='colis')DB.overrides[id].colisQty=parseInt(val);
  saveDB();
}

function toggleDayTag(el){ el.classList.toggle('on'); }

function addSupplier(){
  const name=document.getElementById('new-sname').value.trim();
  if(!name){alert('Nom obligatoire.');return;}
  const color=document.getElementById('new-scolor').value;
  const wa=document.getElementById('new-swa').value.trim();
  const days=[...document.querySelectorAll('#new-sdays .dtag.on')].map(t=>parseInt(t.dataset.day));
  const dayStart=parseInt(document.getElementById('new-sdaystart').value)||8;
  const dayEnd=parseInt(document.getElementById('new-sdayend').value)||5;
  const modeEl=document.querySelector('input[name="new-smode"]:checked');
  const viaDabray=modeEl?modeEl.value==='via_dabray':false;
  const id='sup-'+uid();
  DB.suppliers[id]={name,color,wa,days,dayStart,dayEnd,viaDabray};
  saveDB();
  showTab('fournisseurs');
}

function updSup(id,field,val){ if(DB.suppliers[id])DB.suppliers[id][field]=val; saveDB(); }
function toggleSupDay(id,day,el){
  el.classList.toggle('on');
  const sup=DB.suppliers[id];if(!sup)return;
  if(sup.days.includes(day))sup.days=sup.days.filter(d=>d!==day);
  else sup.days.push(day);
  saveDB();
}
function deleteSupplier(id){
  if(!confirm('Supprimer ce fournisseur ? Les produits associés resteront mais sans fournisseur.'))return;
  delete DB.suppliers[id];
  saveDB();
  showTab('fournisseurs');
}

  body.innerHTML='';

  addCard.innerHTML=`<div class="acard-title">➕ Nouvel accès</div>

      <div class="arow-info">Catégories accessibles</div>
      <div style="display:flex;flex-direction:column;gap:4px;width:100%;" id="new-ucats">

      </div>
    </div>
    <button class="abtn abtn-primary add-btn" onclick="addUser()" style="margin-top:10px;">+ Créer cet accès</button>`;
  body.appendChild(addCard);

  // Utilisateurs existants
  const listCard=document.createElement('div');
  listCard.className='acard';
  listCard.innerHTML='<div class="acard-title">Accès existants</div>';
  Object.entries(DB.users).forEach(([pin,user])=>{
    const row=document.createElement('div');
    row.className='arow'; row.style.flexWrap='wrap'; row.style.gap='6px';
    row.innerHTML=`
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <strong style="font-size:14px;">${user.name}</strong>
          <input class="ainput ainput-w70" type="text" value="${pin}" maxlength="4" inputmode="numeric"
            onchange="changePIN('${pin}',this.value)" style="letter-spacing:3px;">
        </div>
        <div style="font-size:11px;color:var(--mid);">Catégories : ${user.cats.map(c=>DB.cats.find(cat=>cat.id===c)?.label||c).join(', ')}</div>
      </div>
      <button class="abtn abtn-danger" style="padding:5px 8px;font-size:11px;align-self:flex-start;" onclick="deleteUser('${pin}')">✕</button>`;

function addUser(){
  const name=document.getElementById('new-uname').value.trim();
  const pin=document.getElementById('new-upin').value.trim();
  const cats=[...document.querySelectorAll('#new-ucats input:checked')].map(c=>c.value);
  if(!name||!pin){alert('Prénom et PIN obligatoires.');return;}
  if(!/^\d{4}$/.test(pin)){alert('PIN doit être 4 chiffres.');return;}
  if(pin===ADMIN_PIN){alert('Ce PIN est réservé à l\'admin.');return;}
  if(DB.users[pin]){alert('Ce PIN est déjà utilisé.');return;}
  if(!cats.length){alert('Sélectionnez au moins une catégorie.');return;}
  DB.users[pin]={name,cats};
  saveDB();
  showTab('acces');
}

function changePIN(oldPin,newPin){
  if(!/^\d{4}$/.test(newPin)){alert('PIN doit être 4 chiffres.');showTab('acces');return;}
  if(newPin===ADMIN_PIN){alert('PIN réservé admin.');showTab('acces');return;}
  if(DB.users[newPin]&&newPin!==oldPin){alert('PIN déjà utilisé.');showTab('acces');return;}
  const user=DB.users[oldPin];
  delete DB.users[oldPin];
  DB.users[newPin]=user;
  saveDB();
}

function deleteUser(pin){
  if(!confirm(`Supprimer l'accès de ${DB.users[pin]?.name} ?`))return;
  delete DB.users[pin];
  saveDB();
  showTab('acces');
}
