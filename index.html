<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milo's Pizza — Carte</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #9B1C1C;
    --rouge-clair: #C0392B;
    --creme: #F5F0E8;
    --creme-fonce: #EDE6D8;
    --vert: #6B7E5A;
    --brun: #3D2B1F;
    --texte: #2C2010;
    --gris: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--creme); font-family: 'Montserrat', sans-serif; color: var(--texte); min-height: 100vh; }

  header {
    background: var(--creme);
    text-align: center;
    padding: 2rem 1rem 1.2rem;
    border-bottom: 2px solid var(--rouge);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(155,28,28,0.08);
  }
  .logo-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(2rem, 6vw, 3rem); color: var(--rouge); line-height: 1; }
  .logo-sub { font-family: 'Montserrat', sans-serif; font-weight: 300; letter-spacing: 0.45em; font-size: 0.68rem; color: var(--brun); text-transform: uppercase; margin-top: 0.2rem; }

  nav { display: flex; overflow-x: auto; background: var(--brun); scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    flex-shrink: 0; background: none; border: none;
    color: rgba(255,255,255,0.6); font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 0.8rem 1rem; cursor: pointer;
    transition: all 0.2s; white-space: nowrap; border-bottom: 2px solid transparent;
  }
  nav button.active, nav button:hover { color: #fff; border-bottom-color: var(--rouge-clair); background: rgba(155,28,28,0.15); }

  .section { display: none; padding: 1.5rem 1rem 4rem; max-width: 700px; margin: 0 auto; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.4rem); font-weight: 300; color: var(--vert); text-align: center; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .section-subtitle { text-align: center; font-size: 0.68rem; color: var(--rouge); font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.5rem; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; text-transform: none; letter-spacing: 0; }
  .divider { width: 40px; height: 2px; background: var(--rouge); margin: 0.5rem auto 1.5rem; }

  .item {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 1rem; padding: 1rem 0; border-bottom: 1px solid rgba(61,43,31,0.08);
    cursor: pointer; transition: background 0.15s;
  }
  .item:hover { background: rgba(155,28,28,0.03); }
  .item-info { flex: 1; }
  .item-name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.8rem; color: var(--rouge); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.2rem; }
  .item-desc { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; color: #5A4535; line-height: 1.5; font-style: italic; }
  .item-price { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--brun); white-space: nowrap; min-width: 48px; text-align: right; }

  .sub-cat { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--rouge); letter-spacing: 0.15em; text-transform: uppercase; margin: 2rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--creme-fonce); }

  /* PHOTO MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
  .modal-box { background: var(--creme); border-radius: 12px; max-width: 480px; width: 100%; overflow: hidden; }
  .modal-img { width: 100%; height: 220px; object-fit: cover; display: block; }
  .modal-img.no-photo { height: 0; }
  .modal-body { padding: 1.2rem; }
  .modal-name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.85rem; color: var(--rouge); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .modal-desc { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: #5A4535; font-style: italic; line-height: 1.5; margin-bottom: 0.8rem; }
  .modal-price { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: var(--brun); }
  .modal-close { width: 100%; background: var(--brun); color: #fff; border: none; padding: 0.8rem; font-family: 'Montserrat', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }

  /* LOADING */
  .loading { text-align: center; padding: 3rem 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gris); }
  .loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--rouge); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 0.5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 2rem; font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gris); font-style: italic; }

  .photo-badge { display: inline-block; width: 7px; height: 7px; background: var(--vert); border-radius: 50%; margin-left: 6px; vertical-align: middle; }

  .menu-enfant { background: var(--creme-fonce); border: 1px solid var(--rouge); border-radius: 8px; padding: 1.2rem; text-align: center; margin: 1.5rem 0; }
  .menu-enfant .e-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--vert); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .menu-enfant p { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; color: var(--rouge); font-weight: 600; line-height: 1.7; letter-spacing: 0.05em; text-transform: uppercase; }
  .menu-enfant .e-price { font-size: 1.3rem; font-weight: 700; color: var(--brun); margin-top: 0.5rem; font-family: 'Cormorant Garamond', serif; }

  .supplements-box { background: var(--brun); color: #fff; border-radius: 8px; padding: 1.2rem; margin-top: 2rem; text-align: center; }
  .supplements-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--creme); margin-bottom: 0.4rem; }
  .supplements-box p { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-bottom: 0.8rem; }
  .sup-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
  .sup-tag { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 0.25rem 0.7rem; font-size: 0.7rem; color: rgba(255,255,255,0.85); }
  .sup-price { margin-top: 0.8rem; font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--creme); }

  .footer { text-align: center; padding: 1rem; font-size: 0.65rem; color: var(--gris); letter-spacing: 0.05em; border-top: 1px solid var(--creme-fonce); max-width: 700px; margin: 0 auto; }

  .refresh-btn { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--rouge); color: #fff; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(155,28,28,0.4); z-index: 200; transition: transform 0.2s; }
  .refresh-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

<header>
  <div class="logo-text">Milo's Pizza</div>
  <div class="logo-sub">9 rue Bavastro · Nice</div>
</header>

<nav id="nav"><div class="loading" style="color:#fff;padding:0.8rem 1.5rem">Chargement</div></nav>

<main id="main"><div class="loading" style="padding:4rem">Chargement de la carte</div></main>

<div class="footer">Prix nets service compris · Allergènes disponibles sur demande</div>

<button class="refresh-btn" onclick="loadMenu()" title="Actualiser">↻</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <img id="modalImg" src="" alt="" class="modal-img">
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-price" id="modalPrice"></div>
    </div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Fermer</button>
  </div>
</div>

<script>
const SHEET_ID = '1LJF6jRzh1L0dox9I0zOUOpxaZz9uDPyjVC_2CuIMzEc';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

// Ordre et noms des catégories
const CAT_ORDER = [
  'Pour commencer',
  'Salade Bowl',
  'Nos Camemberts Rôtis',
  'Pizza Veggie',
  'Pizza Charcuterie',
  'Pizza Viandes & Poissons',
  'Desserts',
  'Boissons Chaudes',
  'Softs',
  'Bières',
  'Cocktails',
  'Mocktails',
  'Vins Blancs',
  'Vins Rosés',
  'Vins Rouges',
  'Les Bulles',
  'Alcools',
];

// Grouper les boissons sous un même onglet
const TAB_GROUPS = {
  'Pour commencer': 'Pour commencer',
  'Salade Bowl': 'Pour commencer',
  'Nos Camemberts Rôtis': 'Camemberts Rôtis',
  'Pizza Veggie': 'Pizza Veggie',
  'Pizza Charcuterie': 'Pizza Charcuterie',
  'Pizza Viandes & Poissons': 'Viandes & Poissons',
  'Desserts': 'Desserts',
  'Boissons Chaudes': 'Boissons',
  'Softs': 'Boissons',
  'Bières': 'Boissons',
  'Cocktails': 'Boissons',
  'Mocktails': 'Boissons',
  'Vins Blancs': 'Vins & Alcools',
  'Vins Rosés': 'Vins & Alcools',
  'Vins Rouges': 'Vins & Alcools',
  'Les Bulles': 'Vins & Alcools',
  'Alcools': 'Vins & Alcools',
};

const CAT_SUBTITLES = {
  'Nos Camemberts Rôtis': 'Un savoureux camembert rôti, coulant et fondant, entouré de sa pâte à pizza',
  'Salade Bowl': 'Servi dans un bol réalisé en pâte à pizza',
};

let menuData = {};
let currentTab = '';

async function loadMenu() {
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*?$/s, '$1'));
    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label.toLowerCase());

    const iNom = cols.findIndex(c => c.includes('nom'));
    const iCat = cols.findIndex(c => c.includes('cat'));
    const iDesc = cols.findIndex(c => c.includes('desc'));
    const iPrix = cols.findIndex(c => c.includes('prix'));
    const iPhoto = cols.findIndex(c => c.includes('photo'));

    menuData = {};
    rows.forEach(row => {
      const c = row.c;
      const nom = c[iNom]?.v || '';
      const cat = c[iCat]?.v || '';
      if (!nom || !cat) return;
      if (!menuData[cat]) menuData[cat] = [];
      menuData[cat].push({
        nom,
        desc: c[iDesc]?.v || '',
        prix: c[iPrix]?.v || '',
        photo: c[iPhoto]?.v || '',
      });
    });

    renderMenu();
  } catch(e) {
    document.getElementById('main').innerHTML = `
      <div style="text-align:center;padding:3rem 1rem;font-family:'Cormorant Garamond',serif;color:#888">
        <div style="font-size:2rem;margin-bottom:1rem">🍕</div>
        <div>Impossible de charger la carte.<br>Vérifiez que le Google Sheets est bien partagé en public.</div>
      </div>`;
    document.getElementById('nav').innerHTML = '';
  }
}

function renderMenu() {
  // Build tabs
  const tabs = {};
  CAT_ORDER.forEach(cat => {
    if (!menuData[cat]) return;
    const tab = TAB_GROUPS[cat] || cat;
    if (!tabs[tab]) tabs[tab] = [];
    tabs[tab].push(cat);
  });
  // Also add any unknown cats
  Object.keys(menuData).forEach(cat => {
    const tab = TAB_GROUPS[cat] || cat;
    if (!tabs[tab]) tabs[tab] = [];
    if (!tabs[tab].includes(cat)) tabs[tab].push(cat);
  });

  const tabNames = Object.keys(tabs);
  if (tabNames.length === 0) {
    document.getElementById('nav').innerHTML = '';
    document.getElementById('main').innerHTML = '<div class="empty-state">Le tableau Google Sheets est vide.<br>Ajoutez des plats pour les voir apparaître ici.</div>';
    return;
  }

  currentTab = tabNames[0];

  // Nav
  document.getElementById('nav').innerHTML = tabNames.map((t, i) =>
    `<button onclick="showTab('${t}')" id="tab_${CSS.escape(t)}" class="${i===0?'active':''}">${t}</button>`
  ).join('');

  // Sections
  document.getElementById('main').innerHTML = tabNames.map((t, i) => {
    const cats = tabs[t];
    let html = `<div class="section ${i===0?'active':''}" id="sec_${t.replace(/[^a-zA-Z0-9]/g,'_')}">`;

    // Title = first cat if only one, else tab name
    html += `<div class="section-title">${t}</div>`;
    if (CAT_SUBTITLES[cats[0]] && cats.length === 1) {
      html += `<div class="section-subtitle">${CAT_SUBTITLES[cats[0]]}</div>`;
    }
    html += `<div class="divider"></div>`;

    cats.forEach(cat => {
      if (cats.length > 1) {
        const subtitle = CAT_SUBTITLES[cat] ? `<span style="display:block;font-size:0.8rem;font-weight:300;font-style:italic;text-transform:none;letter-spacing:0;color:#888">${CAT_SUBTITLES[cat]}</span>` : '';
        html += `<div class="sub-cat">${cat}${subtitle}</div>`;
      }
      const items = menuData[cat] || [];
      items.forEach((item, idx) => {
        const hasPhoto = item.photo && item.photo.trim() !== '';
        html += `<div class="item" onclick="openModal('${cat}',${idx})">
          <div class="item-info">
            <div class="item-name">${item.nom}${hasPhoto ? '<span class="photo-badge"></span>' : ''}</div>
            ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
          </div>
          <div class="item-price">${item.prix}</div>
        </div>`;
      });
    });

    // Extras
    if (t === 'Pour commencer') html += renderMenuEnfant();
    if (t === 'Pizza Charcuterie') html += renderSupplements();

    html += '</div>';
    return html;
  }).join('');
}

function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById('sec_' + name.replace(/[^a-zA-Z0-9]/g,'_'));
  if (sec) sec.classList.add('active');
  const btn = document.getElementById('tab_' + CSS.escape(name));
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}); }
  currentTab = name;
}

function openModal(cat, idx) {
  const item = menuData[cat]?.[idx];
  if (!item) return;
  const img = document.getElementById('modalImg');
  if (item.photo && item.photo.trim()) {
    img.src = item.photo.trim();
    img.className = 'modal-img';
    img.onerror = () => { img.className = 'modal-img no-photo'; };
  } else {
    img.src = '';
    img.className = 'modal-img no-photo';
  }
  document.getElementById('modalName').textContent = item.nom;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalPrice').textContent = item.prix;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function renderMenuEnfant() {
  return `<div class="menu-enfant">
    <div class="e-title">Menu Enfant</div>
    <p>1 Mini Pizza (Reine ou Marguerite)<br>+ 1 Sirop à l'eau<br>+ 1 Boule de glace au choix</p>
    <div class="e-price">12€</div>
  </div>`;
}

function renderSupplements() {
  const tags = ['Fromage','Charcuterie','Légumes','Œuf','Burrata','Mozzarella','Jambon cuit','Bresaola','Artichauts','Poivrons','Champignons'];
  return `<div class="supplements-box">
    <h3>Ajoutez une touche gourmande</h3>
    <p>Personnalisez votre pizza selon vos envies</p>
    <div class="sup-tags">${tags.map(t=>`<span class="sup-tag">${t}</span>`).join('')}</div>
    <div class="sup-price">À partir de <strong>1,5€</strong> seulement</div>
  </div>`;
}

loadMenu();
</script>
</body>
</html>
