<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supprimer un utilisateur</title>
<style>
  body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
  h2 { color: #d63031; }
  input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
  button { width: 100%; padding: 14px; background: #d63031; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
  #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<h2>🗑️ Supprimer un utilisateur</h2>
<input type="email" id="superEmail" placeholder="Ton email superadmin" value="milospizza.nice@gmail.com" />
<input type="password" id="superPwd" placeholder="Ton mot de passe superadmin" />
<input type="email" id="targetEmail" placeholder="Email à supprimer" value="burgerking@test.fr" />
<button onclick="deleteUser()">Supprimer cet utilisateur</button>
<div id="result"></div>

<script>
const WORKER = 'https://milos-github-proxy.milospizza-nice.workers.dev';

async function deleteUser() {
  const superEmail = document.getElementById('superEmail').value.trim();
  const superPwd = document.getElementById('superPwd').value;
  const targetEmail = document.getElementById('targetEmail').value.trim();
  const result = document.getElementById('result');

  try {
    // 1. Login as superadmin to get fresh token
    const loginRes = await fetch(`${WORKER}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: superEmail, password: superPwd })
    });
    const loginData = await loginRes.json();

    if (!loginRes.ok || !loginData.token) {
      showResult('❌ Connexion superadmin échouée : ' + (loginData.error || 'inconnue'), false);
      return;
    }

    // 2. Delete the target user
    const delRes = await fetch(`${WORKER}/admin/users`, {
      method: 'DELETE',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${loginData.token}`
      },
      body: JSON.stringify({ email: targetEmail })
    });
    const delData = await delRes.json();

    if (delRes.ok && delData.success) {
      showResult('✅ Utilisateur supprimé : ' + targetEmail, true);
    } else {
      showResult('❌ Erreur suppression : ' + (delData.error || JSON.stringify(delData)), false);
    }
  } catch (e) {
    showResult('❌ Erreur réseau : ' + e.message, false);
  }
}

function showResult(msg, success) {
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.className = success ? 'success' : 'error';
  result.innerHTML = msg;
}
</script>
</body>
</html>
