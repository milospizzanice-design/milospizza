<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurer les photos</title>
<style>
  body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; background: #f5f5f5; text-align: center; }
  h2 { color: #d63031; }
  button { padding: 16px 32px; background: #d63031; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; }
  #result { margin-top: 24px; padding: 16px; border-radius: 10px; font-size: 15px; display: none; }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
  .note { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<h2>🔧 Restaurer les photos</h2>
<div class="note">Copie le contenu de <strong>menudata.json</strong> vers <strong>menudata_draft.json</strong> pour restaurer les photos.</div>
<button onclick="restore()">Restaurer les photos</button>
<div id="result"></div>

<script>
const WORKER = 'https://milos-github-proxy.milospizza-nice.workers.dev';
const REPO = 'milospizzanice-design/milospizza';

async function restore() {
  const btn = document.querySelector('button');
  btn.textContent = 'En cours...';
  btn.disabled = true;
  const result = document.getElementById('result');
  result.style.display = 'none';

  try {
    // 1. Lire menudata.json
    const srcRes = await fetch(`${WORKER}/repos/${REPO}/contents/menudata.json`);
    const srcData = await srcRes.json();
    const content = srcData.content.replace(/\n/g, '');

    // 2. Lire le SHA de menudata_draft.json
    const draftRes = await fetch(`${WORKER}/repos/${REPO}/contents/menudata_draft.json`);
    const draftData = await draftRes.json();
    const draftSha = draftData.sha;

    // 3. Écrire le contenu dans menudata_draft.json
    const putRes = await fetch(`${WORKER}/repos/${REPO}/contents/menudata_draft.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Restauration photos: copie menudata vers menudata_draft',
        content: content,
        sha: draftSha
      })
    });

    const putData = await putRes.json();

    if (putRes.ok && putData.commit) {
      result.style.display = 'block';
      result.className = 'success';
      result.innerHTML = '✅ Photos restaurées avec succès !<br><br>Recharge le site pour voir les photos.';
    } else {
      throw new Error(JSON.stringify(putData));
    }
  } catch(e) {
    result.style.display = 'block';
    result.className = 'error';
    result.innerHTML = '❌ Erreur : ' + e.message;
    btn.textContent = 'Réessayer';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
