<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planning - Milo's Pizza</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bx:#B91E26;--bxdk:#8B1118;--cr:#F2E0C0;--tx:#2A0A0B;--txm:#7A4A35;--txf:#B08060;--bd:#E8D5B5;--wh:#fff;--cr2:#FAF4EC}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{background:var(--cr);font-family:-apple-system,sans-serif;color:var(--tx);min-height:100vh}
.bar{background:var(--bx);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(139,17,24,.3);width:100%}
.bar img{width:48px;flex-shrink:0}
.bar-t{color:#fff;font-size:14px;font-weight:700;flex:1;min-width:0}
.bar-sub{color:rgba(255,255,255,.75);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page{padding:12px;width:100%;max-width:700px;margin:0 auto}
.card{background:var(--wh);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:10px;width:100%}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.7}
.bp{background:var(--bx);color:#fff}
.bs{background:var(--cr2);color:var(--tx);border:1px solid var(--bd)}
.bg2{background:#276749;color:#fff}
.ba{background:#92610A;color:#fff}
.br{background:#991B1B;color:#fff}
.bpur{background:#5B21B6;color:#fff}
.sm{padding:5px 9px;font-size:11px}
.fi{width:100%;background:var(--cr2);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--tx);outline:none}
.fi:focus{border-color:var(--bx)}
.rtabs{display:flex;gap:6px;margin-bottom:12px;width:100%}
.rtab{flex:1;padding:9px 8px;border-radius:8px;border:2px solid var(--bd);background:var(--wh);color:var(--txm);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.rtab.on{background:var(--bx);border-color:var(--bx);color:#fff}
.wnav{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.wnav-label{font-size:12px;font-weight:600;color:var(--txm);flex:1;text-align:center;min-width:0}
.act-bar{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.act-bar .btn{width:100%}
.emp-card{background:var(--wh);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden;width:100%}
.emp-hd{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer}
.emp-av{width:36px;height:36px;border-radius:50%;background:var(--bx);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.emp-info{flex:1;min-width:0}
.emp-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-meta{font-size:10px;color:var(--txm);margin-top:1px}
.emp-tog{font-size:16px;color:var(--txm);flex-shrink:0;transition:transform .2s}
.emp-tog.open{transform:rotate(90deg)}
.emp-body{display:none;padding:0 12px 12px;border-top:1px solid var(--bd)}
.emp-body.open{display:block}
.tpl-box{background:var(--cr2);border-radius:8px;padding:10px;margin:10px 0}
.tpl-ttl{font-size:10px;font-weight:700;color:var(--txm);text-transform:uppercase;margin-bottom:8px}
.tpl-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tpl-inp{width:80px;background:var(--wh);border:1px solid var(--bd);border-radius:6px;padding:6px 7px;font-size:13px;color:var(--tx);outline:none;flex-shrink:0}
.days-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.day-cb{display:none}
.day-lbl{width:34px;height:34px;border-radius:7px;border:2px solid var(--bd);font-size:11px;font-weight:600;cursor:pointer;color:var(--txm);display:flex;align-items:center;justify-content:center;transition:all .15s}
.day-cb:checked + .day-lbl{background:var(--bx);border-color:var(--bx);color:#fff}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.day-col{background:var(--cr2);border-radius:8px;padding:6px 4px;min-height:70px;min-width:0}
.day-hd{font-size:9px;font-weight:700;color:var(--txm);text-align:center;margin-bottom:2px;text-transform:uppercase}
.day-dt{font-size:8px;color:var(--txf);text-align:center;margin-bottom:4px}
.creneau{background:var(--wh);border:1px solid var(--bd);border-radius:5px;padding:3px 4px;margin-bottom:6px;position:relative}
.cr-time{font-size:9px;font-weight:600;color:var(--bx);text-align:center;padding-right:10px}
.cr-del{position:absolute;top:-5px;right:-5px;background:#B91E26;border:none;color:#fff;cursor:pointer;font-size:10px;line-height:1;padding:2px 4px;border-radius:50%;font-weight:700;z-index:1;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
.cr-del:hover{color:var(--bx)}
.add-cr{width:100%;background:rgba(185,30,38,0.08);border:1px dashed var(--bx);border-radius:5px;padding:4px 3px;font-size:16px;color:var(--bx);cursor:pointer;text-align:center;font-weight:700;line-height:1}
.add-cr:hover{border-color:var(--bx);color:var(--bx)}
.off-lbl{font-size:9px;color:var(--txf);text-align:center;padding:2px 0}
.emp-acts{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.mb.op{display:flex}
.md{background:var(--wh);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.mdt{font-size:14px;font-weight:700;color:var(--bx);margin-bottom:14px}
.fr{margin-bottom:10px}
.fl2{font-size:11px;font-weight:700;color:var(--txm);text-transform:uppercase;display:block;margin-bottom:3px}
.ma{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
.sal-chk{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.sal-chk:last-child{border-bottom:none}
.sal-chk input{width:18px;height:18px;accent-color:var(--bx);flex-shrink:0}
.gen-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.gen-tbl{border-collapse:collapse;min-width:500px;width:100%;font-size:11px}
.gen-tbl th{background:var(--bx);color:#fff;padding:6px 7px;text-align:center;font-weight:600;white-space:nowrap}
.gen-tbl th:first-child{text-align:left}
.gen-tbl td{border:1px solid var(--bd);padding:5px 6px;vertical-align:top}
.gen-tbl td:first-child{font-weight:600;background:var(--cr2);white-space:nowrap}
.gen-cr{font-size:10px;color:var(--bx);font-weight:600;display:block}
.gen-off{font-size:10px;color:var(--txf)}
</style>
</head>

<script>

var SURL='https://kkfccfipmxnsiohjxfdy.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrZmNjZmlwbXhuc2lvaGp4ZmR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjgwNjcsImV4cCI6MjA5Njg0NDA2N30.cMp5VhkkzSN6i04fJD1B6zVuDfMOHo8GfD91_Q6Rk-U';
var db=supabase.createClient(SURL,SKEY);
var emps=[],planning={},curResto='port';
var wkStart=monOf(new Date());
var crInfo=null,dupliIds=[],curSalId=null,dirty=false;
var DAYS=['L','Ma','Me','J','V','S','D'];
var DAYSFULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
var MONTHS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
var SECTEURS=['cuisine','salle','livraison'];
var SECTEUR_LABELS={cuisine:'Cuisine',salle:'Salle',livraison:'Livraison'};
// Couleurs PDF par secteur (bordeaux clair, or, terracotta)
var SECTEUR_PDF_COLORS={
  cuisine:[139,17,24],
  salle:[146,97,10],
  livraison:[39,103,73]
};

function monOf(d){var x=new Date(d);var day=x.getDay();x.setDate(x.getDate()-(day===0?6:day-1));x.setHours(0,0,0,0);return x;}
function addD(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function ds(d){return d.toISOString().slice(0,10);}
function closeM(id){document.getElementById(id).classList.remove('op');}
function pad(n){return String(n).padStart(2,'0');}
function getWeekDates(){var r=[];for(var i=0;i<7;i++)r.push(addD(wkStart,i));return r;}

function updateLabel(){
  var dates=getWeekDates();
  var lbl='Sem. du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('week-label').textContent=lbl;
  document.getElementById('bar-week').textContent=lbl;
}

async function prevWeek(){if(dirty)await saveAll(true);wkStart=addD(wkStart,-7);updateLabel();await loadPlan();}
async function nextWeek(){if(dirty)await saveAll(true);wkStart=addD(wkStart,7);updateLabel();await loadPlan();}

function switchResto(r,el){
  curResto=r;
  document.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('general-section').style.display='none';
  renderEmps();
}

async function init(){updateLabel();await loadEmps();await loadPlan();}

async function loadEmps(){
  var r=await db.from('employees').select('*').eq('actif',true).order('nom');
  emps=r.data||[];
}

async function loadPlan(){
  var ids=emps.map(function(e){return e.id;});
  if(!ids.length){renderEmps();return;}
  var r=await db.from('planning_creneaux').select('*').gte('date',ds(wkStart)).lte('date',ds(addD(wkStart,6))).in('employee_id',ids);
  planning={};
  (r.data||[]).forEach(function(c){
    if(!planning[c.employee_id])planning[c.employee_id]={};
    if(!planning[c.employee_id][c.date])planning[c.employee_id][c.date]=[];
    planning[c.employee_id][c.date].push({id:c.id,start:c.heure_debut.slice(0,5),end:c.heure_fin.slice(0,5)});
  });
  Object.keys(planning).forEach(function(eid){
    Object.keys(planning[eid]).forEach(function(d){
      planning[eid][d].sort(function(a,b){return a.start.localeCompare(b.start);});
    });
  });
  dirty=false;
  renderEmps();
}

function getFiltered(){
  var list=emps.filter(function(e){return e.restaurant_id===curResto||e.multi_site;});
  // Trier: cuisine > salle > livraison > autres
  list.sort(function(a,b){
    var ai=SECTEURS.indexOf(a.secteur||'salle');
    var bi=SECTEURS.indexOf(b.secteur||'salle');
    if(ai!==bi)return ai-bi;
    return (a.nom||'').localeCompare(b.nom||'');
  });
  return list;
}

function markDirty(){dirty=true;var btn=document.querySelector('.btn.bg2');if(btn){btn.style.background='#92610A';btn.textContent='! Enregistrer';}}

function getSecteurBadge(secteur){
  var colors={cuisine:'background:#FDE8E8;color:#991B1B',salle:'background:#FEF3C7;color:#92400E',livraison:'background:#D1FAE5;color:#065F46'};
  var s=secteur||'salle';
  return '<span style="'+( colors[s]||colors['salle'])+';padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;margin-left:4px">'+(SECTEUR_LABELS[s]||s)+'</span>';
}

function renderEmps(){
  var filtered=getFiltered();
  document.getElementById('emp-count').textContent=filtered.length+' salari\u00e9(s)';
  if(!filtered.length){document.getElementById('emp-list').innerHTML='<div class="card" style="text-align:center;color:#aaa;padding:20px">Aucun salari\u00e9</div>';return;}
  var h='';var dates=getWeekDates();var lastSecteur='';
  filtered.forEach(function(emp){
    var sec=emp.secteur||'salle';
    // Séparateur de section
    if(sec!==lastSecteur){
      var secColors={cuisine:'#991B1B',salle:'#92400E',livraison:'#065F46'};
      h+='<div style="font-size:10px;font-weight:700;color:'+(secColors[sec]||'#7A4A35')+';text-transform:uppercase;letter-spacing:1px;margin:10px 0 5px;padding-left:2px">'+(SECTEUR_LABELS[sec]||sec)+'</div>';
      lastSecteur=sec;
    }
    var ms=emp.multi_site?'<span style="background:#EDE9FE;color:#5B21B6;padding:1px 5px;border-radius:10px;font-size:9px;font-weight:700;margin-left:4px">Multi-site</span>':'';
    var rl=emp.restaurant_id==='port'?'Port':'Dabray';
    var meta=[rl,emp.heures_contrat?emp.heures_contrat+'h/sem':'',emp.taux_horaire?emp.taux_horaire+'\u20ac/h':''].filter(Boolean).join(' \u2022 ');
    h+='<div class="emp-card">';
    h+='<div class="emp-hd" onclick="togEmp('+emp.id+')">';
    h+='<div class="emp-av">'+emp.prenom[0]+'</div>';
    h+='<div class="emp-info"><div class="emp-name">'+emp.prenom+' '+emp.nom+getSecteurBadge(sec)+ms+'</div>';
    h+='<div class="emp-meta">'+meta+'</div></div>';
    h+='<span class="emp-tog" id="tog-'+emp.id+'">&#9654;</span>';
    h+='</div>';
    h+='<div class="emp-body" id="body-'+emp.id+'">';
    h+='<div class="tpl-box">';
    h+='<div class="tpl-ttl">Application rapide sur plusieurs jours</div>';
    h+='<div class="tpl-row">D\u00e9but&nbsp;<input type="time" class="tpl-inp" id="ts-'+emp.id+'" value="17:00">&nbsp;Fin&nbsp;<input type="time" class="tpl-inp" id="te-'+emp.id+'" value="23:30"></div>';
    h+='<div class="days-row">';
    DAYS.forEach(function(d,i){
      h+='<input type="checkbox" class="day-cb" id="dc-'+emp.id+'-'+i+'">';
      h+='<label class="day-lbl" for="dc-'+emp.id+'-'+i+'">'+d+'</label>';
    });
    h+='</div>';
    h+='<button class="btn bp sm" onclick="applyTpl('+emp.id+')">Appliquer aux jours coch\u00e9s</button>';
    h+='</div>';
    h+='<div class="days-grid">';
    dates.forEach(function(date,i){
      var dstr=ds(date);
      var crs=(planning[emp.id]&&planning[emp.id][dstr])||[];
      h+='<div class="day-col">';
      h+='<div class="day-hd">'+DAYS[i]+'</div>';
      h+='<div class="day-dt">'+date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+'</div>';
      if(!crs.length)h+='<div class="off-lbl">Off</div>';
      crs.forEach(function(cr,ci){
        h+='<div class="creneau">';
        h+='<button class="cr-del" data-eid="'+emp.id+'" data-d="'+dstr+'" data-i="'+ci+'" onclick="delCrBtn(this)">&#10005;</button>';
        h+='<div class="cr-time">'+cr.start+'<br>'+cr.end+'</div>';
        h+='</div>';
      });
      h+='<button class="add-cr" data-eid="'+emp.id+'" data-d="'+dstr+'" onclick="openCrBtn(this)">+ créneau</button>';
      h+='</div>';
    });
    h+='</div>';
    h+='<div class="emp-acts">';
    h+='<button class="btn bpur sm" onclick="openPDFIndiv('+emp.id+')">&#8595; PDF</button>';
    h+='<button class="btn bs sm" onclick="openEditSal('+emp.id+')">&#9998; Modifier</button>';
    h+='</div>';
    h+='</div></div>';
  });
  document.getElementById('emp-list').innerHTML=h;
}

function togEmp(id){
  var b=document.getElementById('body-'+id);var t=document.getElementById('tog-'+id);
  var op=b.classList.contains('open');b.classList.toggle('open',!op);t.classList.toggle('open',!op);
}
function reopen(eid){var b=document.getElementById('body-'+eid);var t=document.getElementById('tog-'+eid);if(b){b.classList.add('open');t.classList.add('open');}}
function delCrBtn(btn){delCr(parseInt(btn.dataset.eid),btn.dataset.d,parseInt(btn.dataset.i));}
function openCrBtn(btn){openCr(parseInt(btn.dataset.eid),btn.dataset.d);}

function applyTpl(eid){
  var s=document.getElementById('ts-'+eid).value;
  var e=document.getElementById('te-'+eid).value;
  if(!s||!e){alert('Saisissez les heures');return;}
  var dates=getWeekDates();var changed=false;
  DAYS.forEach(function(_,i){
    var cb=document.getElementById('dc-'+eid+'-'+i);
    if(cb&&cb.checked){
      var d=ds(dates[i]);
      if(!planning[eid])planning[eid]={};
      if(!planning[eid][d])planning[eid][d]=[];
      var exists=planning[eid][d].some(function(c){return c.start===s&&c.end===e;});
      if(!exists){planning[eid][d].push({start:s,end:e,_new:true});planning[eid][d].sort(function(a,b){return a.start.localeCompare(b.start);});changed=true;}
    }
  });
  if(!changed){alert('Aucun jour coch\u00e9 ou cr\u00e9neau d\u00e9j\u00e0 existant');return;}
  markDirty();var wasOpen=document.getElementById('body-'+eid).classList.contains('open');
  renderEmps();if(wasOpen)reopen(eid);
}

function openCr(eid,dstr){
  crInfo={eid:eid,dstr:dstr};
  var d=new Date(dstr+'T12:00:00');var dayIdx=d.getDay()===0?6:d.getDay()-1;
  document.getElementById('cr-title').textContent='Cr\u00e9neau \u2014 '+DAYSFULL[dayIdx]+' '+d.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  document.getElementById('cr-s').value='09:00';document.getElementById('cr-e').value='17:00';
  document.getElementById('modal-cr').classList.add('op');
}

function saveCr(){
  if(!crInfo)return;
  var s=document.getElementById('cr-s').value;var e=document.getElementById('cr-e').value;
  if(!s||!e){alert('Saisissez les heures');return;}
  var eid=crInfo.eid;var d=crInfo.dstr;
  if(!planning[eid])planning[eid]={};if(!planning[eid][d])planning[eid][d]=[];
  planning[eid][d].push({start:s,end:e,_new:true});
  planning[eid][d].sort(function(a,b){return a.start.localeCompare(b.start);});
  markDirty();closeM('modal-cr');
  var wasOpen=document.getElementById('body-'+eid)&&document.getElementById('body-'+eid).classList.contains('open');
  renderEmps();if(wasOpen)reopen(eid);
}

function delCr(eid,dstr,idx){
  if(!planning[eid]||!planning[eid][dstr])return;
  var cr=planning[eid][dstr][idx];
  if(cr.id)cr._del=true;else planning[eid][dstr].splice(idx,1);
  markDirty();
  var wasOpen=document.getElementById('body-'+eid)&&document.getElementById('body-'+eid).classList.contains('open');
  renderEmps();if(wasOpen)reopen(eid);
}

async function saveAll(silent){
  var btn=document.querySelector('.btn.bg2');
  if(btn){btn.textContent='Sauvegarde...';btn.disabled=true;}
  var err=0;
  for(var eid in planning){
    for(var d in planning[eid]){
      var crs=planning[eid][d];
      for(var i=0;i<crs.length;i++){
        var cr=crs[i];
        if(cr._del&&cr.id){var r=await db.from('planning_creneaux').delete().eq('id',cr.id);if(r.error)err++;}
        else if(cr._new&&!cr._del){var r2=await db.from('planning_creneaux').insert({employee_id:parseInt(eid),date:d,heure_debut:cr.start,heure_fin:cr.end});if(r2.error)err++;else cr._new=false;}
      }
      planning[eid][d]=crs.filter(function(c){return !c._del;});
    }
  }
  dirty=false;
  if(btn){btn.innerHTML=err?'Erreur ('+err+')':'&#10003; Enregistr\u00e9';btn.disabled=false;btn.style.background='';setTimeout(function(){btn.innerHTML='&#10003; Enregistrer';},2000);}
  if(!silent)await loadPlan();
}

function openDupli(){
  var filtered=getFiltered();var h='';
  filtered.forEach(function(em){
    h+='<div class="sal-chk"><input type="checkbox" id="dup-'+em.id+'" checked><label for="dup-'+em.id+'" style="font-size:13px;cursor:pointer">'+em.prenom+' '+em.nom+'</label></div>';
  });
  document.getElementById('dupli-list').innerHTML=h;
  document.getElementById('modal-dupli').classList.add('op');
}
function chkAll(v){document.querySelectorAll('#dupli-list input').forEach(function(cb){cb.checked=v;});}

function confirmDupli(){
  dupliIds=[];
  document.querySelectorAll('#dupli-list input').forEach(function(cb){if(cb.checked)dupliIds.push(parseInt(cb.id.replace('dup-','')));});
  if(!dupliIds.length){alert('S\u00e9lectionnez au moins un salari\u00e9');return;}
  var next=addD(wkStart,7);
  document.getElementById('confirm-msg').textContent='Le planning de '+dupliIds.length+' salari\u00e9(s) sera copi\u00e9 sur la semaine du '+next.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})+'. Les cr\u00e9neaux existants seront \u00e9cras\u00e9s.';
  closeM('modal-dupli');document.getElementById('modal-confirm').classList.add('op');
}

async function doDupli(){
  closeM('modal-confirm');var dates=getWeekDates();var err=0;
  for(var si=0;si<dupliIds.length;si++){
    var eid=dupliIds[si];
    for(var di=0;di<dates.length;di++){
      var src=ds(dates[di]);var dst=ds(addD(dates[di],7));
      var crs=(planning[eid]&&planning[eid][src])||[];
      await db.from('planning_creneaux').delete().eq('employee_id',eid).eq('date',dst);
      for(var ci=0;ci<crs.length;ci++){
        if(!crs[ci]._del){var r=await db.from('planning_creneaux').insert({employee_id:eid,date:dst,heure_debut:crs[ci].start,heure_fin:crs[ci].end});if(r.error)err++;}
      }
    }
  }
  alert(err?'Dupliqu\u00e9 avec '+err+' erreur(s)':'Planning dupliqu\u00e9 avec succ\u00e8s !');
}

function toggleGeneral(){
  var s=document.getElementById('general-section');
  if(s.style.display!=='none'){s.style.display='none';return;}
  s.style.display='block';renderGeneral();s.scrollIntoView({behavior:'smooth'});
}

function renderGeneral(){
  var dates=getWeekDates();var filtered=getFiltered();
  var rl=curResto==='port'?'Port \u2014 Bavastro':'Dabray';
  var wl='Sem. du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('gen-title').textContent=rl+' \u2014 '+wl;
  var h='<thead><tr><th>Salari\u00e9</th><th>Secteur</th>';
  dates.forEach(function(d,i){h+='<th>'+DAYSFULL[i].slice(0,3)+'<br><span style="font-size:9px">'+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+'</span></th>';});
  h+='</tr></thead><tbody>';
  var lastSec='';
  filtered.forEach(function(em){
    var sec=em.secteur||'salle';
    if(sec!==lastSec){
      var secBg={cuisine:'#FDE8E8',salle:'#FEF3C7',livraison:'#D1FAE5'};
      var secTx={cuisine:'#991B1B',salle:'#92400E',livraison:'#065F46'};
      h+='<tr><td colspan="'+(9)+'" style="background:'+(secBg[sec]||'#FAF4EC')+';color:'+(secTx[sec]||'#7A4A35')+';font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 8px">'+(SECTEUR_LABELS[sec]||sec)+'</td></tr>';
      lastSec=sec;
    }
    h+='<tr><td>'+em.prenom+' '+em.nom+'</td>';
    h+='<td>'+getSecteurBadge(sec)+'</td>';
    dates.forEach(function(d){
      var crs=(planning[em.id]&&planning[em.id][ds(d)])||[];
      h+='<td>';
      if(!crs.length)h+='<span class="gen-off">Off</span>';
      else crs.forEach(function(cr){h+='<span class="gen-cr">'+cr.start+'-'+cr.end+'</span>';});
      h+='</td>';
    });
    h+='</tr>';
  });
  document.getElementById('gen-table').innerHTML=h+'</tbody>';
}

// ── PDF HELPERS ────────────────────────────────────────────────
function drawPDFHeader(doc,title,subtitle,pageW){
  // Fond bordeaux header
  doc.setFillColor(185,30,38);doc.rect(0,0,pageW,18,'F');
  doc.setTextColor(242,224,192);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text(title,8,11);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(subtitle,8,16);
}

function drawPDFTableHeader(doc,cols,colWidths,y,startX){
  var x=startX;
  doc.setFontSize(8);doc.setFont('helvetica','bold');
  colWidths.forEach(function(w,i){
    doc.setFillColor(242,224,192);doc.setDrawColor(216,197,167);
    doc.rect(x,y,w,10,'FD');
    doc.setTextColor(122,74,53);
    var lines=cols[i].split('\n');
    if(lines.length>1){doc.setFontSize(8);doc.text(lines[0],x+2,y+4);doc.setFontSize(7);doc.text(lines[1],x+2,y+8);}
    else doc.text(cols[i],x+2,y+6);
    x+=w;
  });
}

function drawPDFRow(doc,em,crs_map,dates,colWidths,y,startX,ri){
  var sec=em.secteur||'salle';
  var sc=SECTEUR_PDF_COLORS[sec]||[122,74,53];
  var maxCr=0;
  dates.forEach(function(d){var c=crs_map[ds(d)]||[];if(c.length>maxCr)maxCr=c.length;});
  var rh=Math.max(10,maxCr*5+5);
  var x=startX;
  if(ri%2===0)doc.setFillColor(255,253,248);else doc.setFillColor(250,244,235);
  doc.setDrawColor(216,197,167);
  colWidths.forEach(function(w,ci){
    doc.rect(x,y,w,rh,'FD');
    if(ci===0){
      doc.setTextColor(42,10,11);doc.setFontSize(8);doc.setFont('helvetica','bold');
      doc.text(em.prenom+' '+em.nom,x+2,y+6);
      doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.setTextColor(sc[0],sc[1],sc[2]);
      doc.text(SECTEUR_LABELS[sec]||sec,x+2,y+10);
    }else if(ci===1){
      // colonne secteur sur planning individuel (pas sur général)
    }else{
      var dateIdx=ci-1;
      var crs=crs_map[ds(dates[dateIdx])]||[];
      doc.setFont('helvetica','normal');
      if(!crs.length){doc.setTextColor(176,128,96);doc.setFontSize(7);doc.text('Off',x+2,y+6);}
      else{doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFontSize(7);crs.forEach(function(cr,i){doc.text(cr.start+'-'+cr.end,x+2,y+5+(i*5));});}
    }
    x+=w;
  });
  return rh;
}

async function exportMonthPDF(){
  if(!window.jspdf){alert('PDF en cours de chargement, r\u00e9essayez');return;}
  var val=document.getElementById('pdf-month').value;
  if(!val){alert('S\u00e9lectionnez un mois');return;}
  closeM('modal-pdf-month');
  var jsPDF=window.jspdf.jsPDF;
  var parts=val.split('-');var year=parseInt(parts[0]);var month=parseInt(parts[1])-1;
  var firstDay=new Date(year,month,1);var lastDay=new Date(year,month+1,0);
  var weeks=[];var cur=monOf(firstDay);
  while(ds(cur)<=ds(lastDay)){weeks.push(new Date(cur));cur=addD(cur,7);}
  var filtered=getFiltered();
  var rl=curResto==='port'?'Port - Bavastro':'Dabray';
  var monthLabel=MONTHS[month]+' '+year;
  var allCrs=await db.from('planning_creneaux').select('*').gte('date',ds(firstDay)).lte('date',ds(lastDay)).in('employee_id',filtered.map(function(e){return e.id;}));
  var mplan={};
  (allCrs.data||[]).forEach(function(c){
    if(!mplan[c.employee_id])mplan[c.employee_id]={};
    if(!mplan[c.employee_id][c.date])mplan[c.employee_id][c.date]=[];
    mplan[c.employee_id][c.date].push({start:c.heure_debut.slice(0,5),end:c.heure_fin.slice(0,5)});
  });
  var doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  var pageW=297;var isFirst=true;
  weeks.forEach(function(wk){
    if(!isFirst)doc.addPage();isFirst=false;
    var dates=[];for(var i=0;i<7;i++)dates.push(addD(wk,i));
    var wlbl='Semaine du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
    drawPDFHeader(doc,'Milo\'s Pizza \u2014 Planning '+rl+' \u2014 '+monthLabel,wlbl,pageW);
    // Colonnes: Salarié + 7 jours (pas de colonne secteur sur le général)
    var colW=[40,32,32,32,32,32,32,33];
    var hdrs=['Salari\u00e9'].concat(dates.map(function(d,i){return DAYSFULL[i].slice(0,3)+'\n'+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}));
    var startY=22;
    // Légende secteurs
    var legendX=8;var legendY=startY-3;
    doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.setTextColor(185,30,38);doc.text('\u25A0 Cuisine',lx,18.5);
    doc.setTextColor(146,97,10);doc.text('\u25A0 Salle',lx+26,18.5);
    doc.setTextColor(39,103,73);doc.text('\u25A0 Livraison',lx+48,18.5);
    drawPDFTableHeader(doc,hdrs,colW,startY,8);
    var y=startY+10;var lastSec='';var rowIdx=0;
    filtered.forEach(function(em){
      var sec=em.secteur||'salle';
      // Ligne fine de séparation de secteur
      if(sec!==lastSec){
        if(lastSec!==''){
          var scBg={cuisine:[253,232,232],salle:[254,243,199],livraison:[209,250,229]};
          var sc2=SECTEUR_PDF_COLORS[sec]||[122,74,53];
          doc.setFillColor(scBg[sec]||[242,224,192]);doc.setDrawColor(216,197,167);
          doc.rect(8,y,pageW-16,5,'FD');
          doc.setFillColor(sc2[0],sc2[1],sc2[2]);
          doc.setTextColor(sc2[0],sc2[1],sc2[2]);doc.setFontSize(7);doc.setFont('helvetica','bold');
          doc.text((SECTEUR_LABELS[sec]||sec).toUpperCase(),15,y+3.5);
          y+=5;
        }
        lastSec=sec;
      }
      var empPlan=mplan[em.id]||{};
      var maxCr=0;
      dates.forEach(function(d){var c=empPlan[ds(d)]||[];if(c.length>maxCr)maxCr=c.length;});
      var rh=Math.max(9,maxCr*5+4);
      var sc=SECTEUR_PDF_COLORS[sec]||[122,74,53];
      var x=8;
      if(rowIdx%2===0)doc.setFillColor(255,253,248);else doc.setFillColor(250,244,235);
      doc.setDrawColor(216,197,167);
      colW.forEach(function(w,ci){
        doc.rect(x,y,w,rh,'FD');
        if(ci===0){
          // Pastille couleur secteur
          doc.setFillColor(sc[0],sc[1],sc[2]);
          
          // Nom salarié
          doc.setTextColor(42,10,11);doc.setFontSize(8);doc.setFont('helvetica','bold');
          doc.text(em.prenom+' '+em.nom,x+6,y+5.5);
        }else{
          var crs=empPlan[ds(dates[ci-1])]||[];
          doc.setFont('helvetica','normal');
          if(!crs.length){doc.setTextColor(176,128,96);doc.setFontSize(7);doc.text('Off',x+2,y+5.5);}
          else{doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFontSize(7);crs.forEach(function(cr,k){doc.text(cr.start+'-'+cr.end,x+2,y+4.5+(k*5));});}
        }
        x+=w;
      });
      y+=rh;rowIdx++;
      if(y>195){doc.addPage();y=15;}
    });
    // Footer
    doc.setFontSize(7);doc.setTextColor(176,128,96);
    doc.text('G\u00e9n\u00e9r\u00e9 le '+new Date().toLocaleDateString('fr-FR')+' \u2014 Milo\'s Pizza',8,204);
  });
  var t=new Date();
  var fname=t.getFullYear()+'_'+pad(t.getMonth()+1)+'_'+pad(t.getDate())+'_planning_'+rl.replace(/[^a-zA-Z0-9]/g,'_')+'_'+monthLabel.replace(/ /g,'_')+'.pdf';
  // iOS Safari: ouvrir dans nouvel onglet (doc.save bloqué en async)
  var ua=navigator.userAgent;
  if(/iPad|iPhone|iPod/.test(ua)){
    doc.output('dataurlnewwindow',{filename:fname});
  }else{
    doc.save(fname);
  }
}

async function saveSal(){
  var p=document.getElementById('sal-prenom').value.trim();
  var n=document.getElementById('sal-nom').value.trim();
  if(!p||!n){alert('Pr\u00e9nom et nom requis');return;}
  var pin=document.getElementById('sal-pin').value.trim();
  var updates={
    prenom:p,nom:n,
    restaurant_id:document.getElementById('sal-resto').value,
    secteur:document.getElementById('sal-secteur').value,
    multi_site:document.getElementById('sal-multi').checked,
    heures_contrat:parseFloat(document.getElementById('sal-heures').value)||null,
    taux_horaire:parseFloat(document.getElementById('sal-taux').value)||null,
    email:document.getElementById('sal-email').value.trim()||null,
    telephone:document.getElementById('sal-tel').value.trim()||null,
    adresse:document.getElementById('sal-adresse').value.trim()||null
  };
  if(curSalId){
    if(pin.length===4){var hr=await db.rpc('hash_pin',{p_pin:pin});if(hr.data)updates.pin_hash=hr.data;}
    var r=await db.from('employees').update(updates).eq('id',curSalId);
    if(r.error){alert('Erreur: '+r.error.message);return;}
  }else{
    if(pin.length!==4){alert('PIN 4 chiffres requis');return;}
    var hr2=await db.rpc('hash_pin',{p_pin:pin});
    if(hr2.error){alert('Erreur hash PIN');return;}
    updates.pin_hash=hr2.data;updates.actif=true;
    var r2=await db.from('employees').insert(updates);
    if(r2.error){alert('Erreur: '+r2.error.message);return;}
  }
  closeM('modal-sal');await loadEmps();renderEmps();
}
