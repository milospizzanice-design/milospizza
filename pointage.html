<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Restoglobal — Pointage</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f1923 0%, #1a2535 60%, #0f1923 100%);
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    user-select: none;
    overflow: hidden;
  }
  .header { text-align: center; margin-bottom: 16px; }
  .brand { font-size: 11px; color: #e53e3e; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .address { font-size: 12px; color: #718096; margin-top: 2px; }
  .clock-time { font-size: 52px; font-weight: 700; letter-spacing: -2px; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; text-align: center; }
  .clock-date { font-size: 13px; color: #a0aec0; text-align: center; margin-top: 4px; text-transform: capitalize; }
  .panel {
    width: 100%; max-width: 340px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 28px 24px;
    margin-top: 20px;
  }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes popIn { 0%{transform:scale(0.6);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

  /* IDLE */
  .idle-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(229,62,62,0.1); border: 2px solid rgba(229,62,62,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px; cursor: pointer;
  }
  .idle-title { color: #e2e8f0; font-size: 17px; font-weight: 600; text-align: center; }
  .idle-sub { color: #718096; font-size: 11px; text-align: center; margin-top: 8px; line-height: 1.4; }

  /* PIN */
  .pin-label { color: #a0aec0; font-size: 13px; text-align: center; margin-bottom: 20px; }
  .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .pin-dot {
    width: 48px; height: 48px; border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .pin-dot.filled { background: #e53e3e; border-color: #e53e3e; }
  .pin-dot.filled::after { content:''; width:12px; height:12px; border-radius:50%; background:#fff; display:block; }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
  .num-btn {
    height: 60px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 24px; font-weight: 600;
    background: rgba(255,255,255,0.07); color: #e2e8f0;
    transition: transform 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .num-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.12); }
  .num-btn.confirm { background: rgba(229,62,62,0.15); color: #e53e3e; font-size: 22px; }
  .num-btn.confirm.ready { background: linear-gradient(135deg,#e53e3e,#c53030); color:#fff; box-shadow:0 4px 15px rgba(229,62,62,0.4); }
  .num-btn.back { font-size: 20px; }
  .cancel-btn { display: block; margin: 16px auto 0; background: none; border: none; color: #718096; font-size: 12px; cursor: pointer; }

  /* CAMERA */
  .cam-label { color: #a0aec0; font-size: 13px; text-align: center; margin-bottom: 16px; }
  .cam-label strong { color: #fff; }
  .cam-wrap { position: relative; display: inline-block; border-radius: 16px; overflow: hidden; display: block; width: fit-content; margin: 0 auto; }
  #video { width: 220px; height: 165px; object-fit: cover; display: block; background: #1a202c; }
  .cam-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
  }
  .countdown-circle {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(229,62,62,0.9); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700;
    box-shadow: 0 0 0 8px rgba(229,62,62,0.25);
  }
  .cam-error { color: #fc8181; font-size: 13px; text-align: center; padding: 20px 0; }

  /* ACTION */
  .emp-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    border: 3px solid #e53e3e; margin: 0 auto 10px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    background: #2d3748; font-size: 28px;
  }
  .emp-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .emp-name { color: #e2e8f0; font-size: 20px; font-weight: 600; text-align: center; }
  .emp-sub { color: #718096; font-size: 13px; text-align: center; margin-top: 4px; }
  .action-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
  .action-btn {
    width: 120px; height: 100px; border-radius: 16px; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.5px;
    transition: transform 0.12s;
  }
  .action-btn:active { transform: scale(0.94); }
  .action-btn .btn-icon { font-size: 28px; }
  .btn-entree { background: linear-gradient(145deg,#38a16999,#38a169dd); box-shadow: 0 6px 20px rgba(56,161,105,0.4); }
  .btn-sortie  { background: linear-gradient(145deg,#e53e3e99,#e53e3edd); box-shadow: 0 6px 20px rgba(229,62,62,0.4); }

  /* CONFIRM */
  .confirm-icon {
    width: 80px; height: 80px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 16px;
    animation: popIn 0.3s ease;
  }
  .confirm-icon.entree { background: linear-gradient(135deg,#38a169,#276749); box-shadow: 0 8px 24px rgba(56,161,105,0.5); }
  .confirm-icon.sortie  { background: linear-gradient(135deg,#e53e3e,#c53030); box-shadow: 0 8px 24px rgba(229,62,62,0.5); }
  .confirm-title { color: #e2e8f0; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .confirm-time  { color: #a0aec0; font-size: 14px; text-align: center; }
  .confirm-time strong { color: #fff; }
  .confirm-name  { color: #718096; font-size: 12px; text-align: center; margin-top: 8px; }

  /* ERROR */
  .error-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(229,62,62,0.1); border: 2px solid #e53e3e;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 16px; color: #e53e3e;
  }
  .error-msg { color: #fc8181; font-size: 15px; font-weight: 600; text-align: center; }
  .error-sub { color: #718096; font-size: 12px; text-align: center; margin-top: 8px; }

  .rgpd { color: #4a5568; font-size: 10px; margin-top: 16px; text-align: center; max-width: 300px; line-height: 1.4; }
  canvas { display: none; }
</style>
</head>
<body>

<!-- Config (à modifier) -->
<script>
  const SUPABASE_URL = 'https://kkfccfipmxnsiohjxfdy.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrZmNjZmlwbXhuc2lvaGp4ZmR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjgwNjcsImV4cCI6MjA5Njg0NDA2N30.cMp5VhkkzSN6i04fJD1B6zVuDfMOHo8GfD91_Q6Rk-U';
  const RESTAURANT_ID = 'port'; // 'port' ou 'dabray' selon la tablette
  const RESTAURANT_LABEL = "Milo's Pizza — Port";
  const RESTAURANT_ADDRESS = '9 rue Bavastro, 06300 Nice';
</script>

<div class="header">
  <div class="brand">Restoglobal</div>
  <div class="address" id="restLabel"></div>
</div>

<div style="text-align:center; margin-bottom:8px;">
  <div class="clock-time" id="clockTime">--:--</div>
  <div class="clock-date" id="clockDate"></div>
</div>

<div class="panel">

  <!-- IDLE -->
  <div class="screen active" id="screen-idle">
    <div class="idle-icon" onclick="showPin()">👆</div>
    <div class="idle-title">Toucher pour pointer</div>
    <div class="idle-sub">Ce terminal enregistre une photo à chaque badgeage.</div>
  </div>

  <!-- PIN -->
  <div class="screen" id="screen-pin">
    <div class="pin-label">Saisir votre code PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pressKey('1')">1</button>
      <button class="num-btn" onclick="pressKey('2')">2</button>
      <button class="num-btn" onclick="pressKey('3')">3</button>
      <button class="num-btn" onclick="pressKey('4')">4</button>
      <button class="num-btn" onclick="pressKey('5')">5</button>
      <button class="num-btn" onclick="pressKey('6')">6</button>
      <button class="num-btn" onclick="pressKey('7')">7</button>
      <button class="num-btn" onclick="pressKey('8')">8</button>
      <button class="num-btn" onclick="pressKey('9')">9</button>
      <button class="num-btn back" onclick="pressKey('back')">⌫</button>
      <button class="num-btn" onclick="pressKey('0')">0</button>
      <button class="num-btn confirm" id="btnConfirm" onclick="confirmPin()">✓</button>
    </div>
    <button class="cancel-btn" onclick="reset()">Annuler</button>
  </div>

  <!-- CAMERA -->
  <div class="screen" id="screen-camera">
    <div class="cam-label">Bonjour <strong id="empPrenom"></strong> — photo en cours…</div>
    <div id="camContainer">
      <div class="cam-wrap">
        <video id="video" muted playsinline autoplay></video>
        <div class="cam-overlay">
          <div class="countdown-circle" id="countdown">3</div>
        </div>
      </div>
    </div>
    <div class="cam-error" id="camError" style="display:none"></div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- ACTION -->
  <div class="screen" id="screen-action">
    <div style="text-align:center;">
      <div class="emp-avatar" id="empAvatar"><span id="empInitial">?</span></div>
      <div class="emp-name" id="empName"></div>
      <div class="emp-sub">Identifié avec succès</div>
    </div>
    <div class="action-btns">
      <button class="action-btn btn-entree" onclick="doAction('entree')">
        <span class="btn-icon">→</span>Entrée
      </button>
      <button class="action-btn btn-sortie" onclick="doAction('sortie')">
        <span class="btn-icon">←</span>Sortie
      </button>
    </div>
  </div>

  <!-- CONFIRM -->
  <div class="screen" id="screen-confirm">
    <div class="confirm-icon" id="confirmIcon">✓</div>
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-time" id="confirmTime"></div>
    <div class="confirm-name" id="confirmName"></div>
  </div>

  <!-- ERROR -->
  <div class="screen" id="screen-error">
    <div class="error-icon">✕</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="error-sub">Réessai dans 3 secondes…</div>
  </div>

</div>

<div class="rgpd">Photos conservées 90 jours · Accès restreint direction · RGPD Art. 13</div>

<script>
// ── Init Supabase ────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── État ─────────────────────────────────────────────────────
let pin = '';
let currentEmployee = null;
let capturedPhoto = null;
let stream = null;
let countdownTimer = null;
let autoResetTimer = null;

// ── Horloge ──────────────────────────────────────────────────
document.getElementById('restLabel').textContent = RESTAURANT_ADDRESS;
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('clockDate').textContent =
    now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
}
updateClock();
setInterval(updateClock, 1000);

// ── Écrans ───────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function reset() {
  clearTimeout(autoResetTimer);
  clearTimeout(countdownTimer);
  stopCamera();
  pin = '';
  currentEmployee = null;
  capturedPhoto = null;
  updateDots();
  showScreen('idle');
}

// ── PIN ──────────────────────────────────────────────────────
function showPin() { showScreen('pin'); }

function pressKey(k) {
  if (k === 'back') { pin = pin.slice(0, -1); }
  else if (pin.length < 4) { pin += k; }
  updateDots();
  if (pin.length === 4) {
    document.getElementById('btnConfirm').classList.add('ready');
  } else {
    document.getElementById('btnConfirm').classList.remove('ready');
  }
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', pin.length > i);
  }
}

async function confirmPin() {
  if (pin.length !== 4) return;
  // Vérification via pgcrypto côté Supabase
  const { data, error } = await db
    .from('employees')
    .select('id, prenom, nom, restaurant_id')
    .eq('restaurant_id', RESTAURANT_ID)
    .eq('actif', true);

  if (error || !data) { showError('Erreur de connexion.'); return; }

  // Vérification du PIN avec crypt() côté SQL
  const { data: match, error: err2 } = await db
    .rpc('verify_pin', { p_pin: pin, p_restaurant: RESTAURANT_ID });

  if (err2 || !match || match.length === 0) {
    pin = '';
    updateDots();
    showError('PIN incorrect ou salarié non affecté à ce restaurant.');
    return;
  }

  currentEmployee = match[0];
  document.getElementById('empPrenom').textContent = currentEmployee.prenom;
  showScreen('camera');
  startCamera();
}

// ── CAMERA ───────────────────────────────────────────────────
function startCamera() {
  const video = document.getElementById('video');
  const camError = document.getElementById('camError');
  camError.style.display = 'none';

  navigator.mediaDevices?.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(s => {
      stream = s;
      video.srcObject = s;
      video.play();
      startCountdown();
    })
    .catch(() => {
      camError.textContent = 'Caméra indisponible — pointage enregistré sans photo.';
      camError.style.display = 'block';
      document.getElementById('camContainer').style.display = 'none';
      startCountdown(true);
    });
}

function startCountdown(noPhoto = false) {
  let count = 3;
  const el = document.getElementById('countdown');
  el.textContent = count;

  countdownTimer = setInterval(() => {
    count--;
    el.textContent = count;
    if (count <= 0) {
      clearInterval(countdownTimer);
      capturePhoto(noPhoto);
    }
  }, 1000);
}

function capturePhoto(noPhoto) {
  if (!noPhoto) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth || 320;
    canvas.height = video.videoHeight || 240;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedPhoto = canvas.toDataURL('image/jpeg', 0.7);
  }
  stopCamera();
  showActionScreen();
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('camContainer').style.display = 'block';
}

// ── ACTION ───────────────────────────────────────────────────
function showActionScreen() {
  const emp = currentEmployee;
  document.getElementById('empInitial').textContent = emp.prenom[0];
  document.getElementById('empName').textContent = emp.prenom + ' ' + emp.nom;

  if (capturedPhoto) {
    const av = document.getElementById('empAvatar');
    av.innerHTML = '<img src="' + capturedPhoto + '" alt="">';
  }
  showScreen('action');
}

async function doAction(type) {
  const now = new Date();

  // Récupère l'IP publique
  let ip = 'inconnu';
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const j = await r.json();
    ip = j.ip;
  } catch(e) {}

  // Vérifie l'IP côté base
  const { data: resto } = await db
    .from('restaurants')
    .select('ip_whitelist')
    .eq('id', RESTAURANT_ID)
    .single();

  const ip_ok = resto?.ip_whitelist?.includes(ip) ?? false;

  // Enregistre le pointage
  const { error } = await db.from('time_entries').insert({
    employee_id:   currentEmployee.id,
    restaurant_id: RESTAURANT_ID,
    type:          type,
    timestamp:     now.toISOString(),
    ip_address:    ip,
    ip_ok:         ip_ok,
    photo_b64:     capturedPhoto || null,
  });

  if (error) { showError('Erreur lors de l\'enregistrement.'); return; }

  // Confirmation
  const isEntree = type === 'entree';
  const icon = document.getElementById('confirmIcon');
  icon.className = 'confirm-icon ' + type;
  icon.textContent = '✓';
  document.getElementById('confirmTitle').textContent = isEntree ? 'Bonne journée !' : 'À bientôt !';
  document.getElementById('confirmTime').innerHTML =
    (isEntree ? 'Entrée' : 'Sortie') + ' enregistrée — <strong>' +
    now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) + '</strong>';
  document.getElementById('confirmName').textContent =
    currentEmployee.prenom + ' ' + currentEmployee.nom;

  showScreen('confirm');
  autoResetTimer = setTimeout(reset, 3500);
}

// ── ERREUR ───────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  showScreen('error');
  autoResetTimer = setTimeout(reset, 3000);
}
</script>
