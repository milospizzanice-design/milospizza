<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Milo's Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C8202A;
    --red-dark: #9e181f;
    --cream: #FAF7F2;
    --dark: #1a1208;
    --gold: #C9A84C;
    --gray: #8a7e6e;
    --border: #e8e0d4;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,32,42,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: 0 4px 40px rgba(26,18,8,0.08), 0 1px 0 rgba(255,255,255,0.8) inset;
    border: 1px solid var(--border);
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-circle {
    width: 72px; height: 72px;
    background: var(--red);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(200,32,42,0.25);
  }

  .logo-circle svg {
    width: 36px; height: 36px;
    fill: white;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--dark);
    letter-spacing: 0.02em;
  }

  .brand span {
    color: var(--red);
  }

  .subtitle {
    font-size: 13px;
    color: var(--gray);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--red);
    background: white;
    box-shadow: 0 0 0 3px rgba(200,32,42,0.08);
  }

  input::placeholder { color: #c5bdb0; }

  .password-wrap {
    position: relative;
  }
  .password-wrap input { padding-right: 48px; }
  .toggle-pw {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    color: var(--gray);
    transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--dark); }

  .btn {
    width: 100%;
    padding: 15px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(200,32,42,0.25);
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: var(--red-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(200,32,42,0.3);
  }

  .btn:active { transform: translateY(0); }

  .btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .btn .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .btn.loading .btn-text { opacity: 0; }
  .btn.loading .spinner { display: block; }

  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 14px;
    text-align: center;
  }

  .error-msg.show { display: block; animation: shake 0.4s ease; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--gray);
  }

  .footer a {
    color: var(--red);
    text-decoration: none;
    font-weight: 500;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--gray);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--dark); }
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="logo-wrap">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <div class="brand">Milo's <span>Admin</span></div>
      <div class="subtitle">Espace de gestion</div>
    </div>

    <div class="divider"><span>Connexion</span></div>

    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pw" onclick="togglePassword()" type="button" aria-label="Afficher le mot de passe">
          <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">Se connecter</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer">
      Problème de connexion ? <a href="mailto:milospizza.nice@gmail.com">Contacter le support</a>
    </div>

  </div>

  <a href="index.html" class="back-link">← Retour au menu</a>
</div>

<script>
  const WORKER = 'https://milos-github-proxy.milospizza-nice.workers.dev';

  // Check if already logged in
  window.addEventListener('load', async () => {
    const token = localStorage.getItem('milos_token');
    if (token) {
      try {
        const res = await fetch(`${WORKER}/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        const data = await res.json();
        if (data.valid) {
          redirectAfterLogin(data.role);
          return;
        }
      } catch(e) {}
      localStorage.removeItem('milos_token');
    }
  });

  function redirectAfterLogin(role) {
    if (role === 'superadmin') {
      window.location.href = 'superadmin.html';
    } else {
      window.location.href = 'index.html#admin';
    }
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('show');

    if (!email || !password) {
      showError('Veuillez remplir tous les champs');
      return;
    }

    btn.classList.add('loading');

    try {
      const res = await fetch(`${WORKER}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('milos_token', data.token);
        localStorage.setItem('milos_role', data.role);
        localStorage.setItem('milos_email', data.email);
        localStorage.setItem('milos_restaurant', data.restaurant);
        redirectAfterLogin(data.role);
      } else {
        showError(data.error || 'Email ou mot de passe incorrect');
      }
    } catch(e) {
      showError('Erreur de connexion. Vérifiez votre connexion internet.');
    }

    btn.classList.remove('loading');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
