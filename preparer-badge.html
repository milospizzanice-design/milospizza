<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pr&eacute;parer un badge - Milo's Pizza</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,Roboto,sans-serif;background:#0F766E;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px}
  h1{font-size:21px;margin-bottom:6px;text-align:center}
  .sub{font-size:13px;opacity:.9;text-align:center;margin-bottom:20px}
  .card{background:#fff;color:#222;border-radius:16px;padding:22px;width:100%;max-width:440px}
  label{font-size:13px;font-weight:600;color:#444;display:block;margin-bottom:6px}
  select{width:100%;padding:14px;font-size:16px;border:2px solid #ddd;border-radius:12px;margin-bottom:16px;background:#fff}
  .btn{width:100%;background:#0F766E;color:#fff;border:none;border-radius:14px;padding:18px;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:14px}
  .btn:disabled{opacity:.4}
  .status{font-size:14px;padding:14px;border-radius:10px;text-align:center;margin-bottom:12px}
  .ok{background:#D1FAE5;color:#065F46}
  .err{background:#FEE2E2;color:#991B1B}
  .info{background:#FEF3C7;color:#92400E}
  .uid{font-family:monospace;font-size:16px;font-weight:700;color:#0F766E;text-align:center;padding:12px;background:#F0FDFA;border-radius:10px;word-break:break-all;margin:8px 0}
  .step{font-size:12px;color:#555;background:#F3F4F6;border-radius:10px;padding:12px;margin-bottom:16px;line-height:1.5}
  .log{font-size:11px;color:#666;max-height:120px;overflow-y:auto;margin-top:10px;border-top:1px solid #eee;padding-top:10px}
  .log div{padding:3px 0;border-bottom:1px solid #f3f3f3}
  .cur{font-size:12px;color:#0F766E;font-weight:600;text-align:center;margin-bottom:8px}
</style>
</head>
<body>
  <h1>&#9881;&#65039; Pr&eacute;parer un badge</h1>
  <div class="sub">Tout en une fois : pr&eacute;pare le badge + associe au salari&eacute;</div>
  <div class="card">
    <div class="step">1. Choisissez le salari&eacute;<br>2. Approchez le badge<br>3. C'est fait : le badge est pr&eacute;par&eacute; et associ&eacute; !</div>
    <div id="compat"></div>
    <label>Salari&eacute;</label>
    <select id="emp-select"><option value="">Chargement...</option></select>
    <button class="btn" id="gobtn" onclick="startAll()" disabled>Approcher le badge</button>
    <div id="result"></div>
    <div class="log" id="log"></div>
  </div>
<script>
var SURL='https://kkfccfipmxnsiohjxfdy.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrZmNjZmlwbXhuc2lvaGp4ZmR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjgwNjcsImV4cCI6MjA5Njg0NDA2N30.cMp5VhkkzSN6i04fJD1B6zVuDfMOHo8GfD91_Q6Rk-U';
var db=supabase.createClient(SURL,SKEY);

function logMsg(t){
  var l=document.getElementById('log');
  var d=document.createElement('div');
  d.textContent='['+new Date().toLocaleTimeString('fr-FR')+'] '+t;
  l.insertBefore(d,l.firstChild);
}

window.addEventListener('load',function(){
  var c=document.getElementById('compat');
  if(!('NDEFReader' in window)){
    c.innerHTML='<div class="status err">\u274C NFC web non support\u00e9. Utilisez Chrome sur Android avec le NFC activ\u00e9.</div>';
  }
  loadEmps();
});

async function loadEmps(){
  try{
    var r=await db.from('employees').select('id,prenom,nom,restaurant_id,badge_uid,archive').order('nom');
    var sel=document.getElementById('emp-select');
    var emps=(r.data||[]).filter(function(e){return !e.archive;});
    if(!emps.length){sel.innerHTML='<option value="">Aucun salari\u00e9</option>';return;}
    var h='<option value="">-- Choisir --</option>';
    emps.forEach(function(e){
      var rl=e.restaurant_id==='port'?'Port':'Dabray';
      var badge=e.badge_uid?' \u2705':'';
      h+='<option value="'+e.id+'">'+e.prenom+' '+e.nom+' ('+rl+')'+badge+'</option>';
    });
    sel.innerHTML=h;
    sel.onchange=function(){document.getElementById('gobtn').disabled=!sel.value;};
    logMsg(emps.length+' salari\u00e9s charg\u00e9s');
  }catch(e){
    document.getElementById('compat').innerHTML='<div class="status err">Erreur de connexion : '+e.message+'</div>';
  }
}

async function startAll(){
  var r=document.getElementById('result');
  var empId=document.getElementById('emp-select').value;
  if(!empId){r.innerHTML='<div class="status err">Choisissez d\u0027abord un salari\u00e9.</div>';return;}
  if(!('NDEFReader' in window)){r.innerHTML='<div class="status err">NFC non support\u00e9.</div>';return;}
  var empName=document.getElementById('emp-select').selectedOptions[0].textContent;
  r.innerHTML='<div class="status info">\u23F3 Approchez le badge et maintenez-le immobile...</div><div class="cur">Pour : '+empName+'</div>';
  logMsg('En attente du badge pour '+empName);
  try{
    var ndef=new NDEFReader();
    // 1. Lire l'UID d'abord (via un scan)
    await ndef.scan();
    ndef.onreading=async function(event){
      var uid=event.serialNumber||'';
      if(!uid){r.innerHTML='<div class="status err">UID non lisible, r\u00e9essayez.</div>';return;}
      logMsg('UID lu : '+uid);
      // 2. Écrire la donnée pour enlever le "tag vide"
      try{
        await ndef.write({records:[{recordType:"text",data:"MILOS-PIZZA-BADGE"}]});
        logMsg('Badge \u00e9crit (plus de tag vide)');
      }catch(we){
        logMsg('\u00c9criture impossible (badge quand m\u00eame associable) : '+we.message);
      }
      // 3. Associer l'UID au salarié
      try{
        var up=await db.from('employees').update({badge_uid:uid}).eq('id',empId);
        if(up.error){r.innerHTML='<div class="status err">Erreur association : '+up.error.message+'</div>';return;}
        r.innerHTML='<div class="status ok">\u2705 Badge pr\u00e9par\u00e9 et associ\u00e9 !</div>'+
          '<div class="uid">'+uid+'</div>'+
          '<div style="font-size:12px;color:#555;text-align:center">Associ\u00e9 \u00e0 '+empName+'</div>';
        logMsg('Association enregistr\u00e9e');
        if(navigator.vibrate)navigator.vibrate(200);
        // Recharger la liste pour montrer le ✅
        loadEmps();
      }catch(ae){
        r.innerHTML='<div class="status err">Erreur : '+ae.message+'</div>';
      }
    };
    ndef.onreadingerror=function(){r.innerHTML='<div class="status err">Lecture difficile, r\u00e9essayez.</div>';};
  }catch(e){
    r.innerHTML='<div class="status err">Erreur : '+e.message+'<br>V\u00e9rifiez que le NFC est activ\u00e9 et que vous \u00eates sur Chrome.</div>';
  }
}
</script>
</body>
</html>
