<style>
  :root {

  body { background: var(--creme); font-family: 'Montserrat', sans-serif; color: var(--texte); min-height: 100vh; }

  header { background: var(--creme); text-align: center; padding: 2rem 1rem 1.2rem; border-bottom: 2px solid var(--rouge); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(155,28,28,0.08); }
  .logo-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(2rem, 6vw, 3rem); color: var(--rouge); line-height: 1; }
  .logo-sub { font-family: 'Montserrat', sans-serif; font-weight: 300; letter-spacing: 0.45em; font-size: 0.68rem; color: var(--brun); text-transform: uppercase; margin-top: 0.2rem; }

  nav { display: flex; overflow-x: auto; background: var(--brun); scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  nav button { flex-shrink: 0; background: none; border: none; color: rgba(255,255,255,0.6); font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.8rem 1rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; border-bottom: 2px solid transparent; }
  nav button.active, nav button:hover { color: #fff; border-bottom-color: var(--rouge-clair); background: rgba(155,28,28,0.15); }

  .section { display: none; padding: 1.5rem 1rem 4rem; max-width: 700px; margin: 0 auto; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.4rem); font-weight: 300; color: var(--vert); text-align: center; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .section-subtitle { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; color: #5A4535; margin-bottom: 1.5rem; }
  .divider { width: 40px; height: 2px; background: var(--rouge); margin: 0.5rem auto 1.5rem; }
  .sub-cat { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--rouge); letter-spacing: 0.15em; text-transform: uppercase; margin: 2rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--creme-fonce); }

  .item { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid rgba(61,43,31,0.08); cursor: pointer; transition: background 0.15s; }
  .item:hover { background: rgba(155,28,28,0.03); }
  .item-info { flex: 1; }
  .item-name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.8rem; color: var(--rouge); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.2rem; }
  .item-desc { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; color: #5A4535; line-height: 1.5; font-style: italic; }
  .item-price { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--brun); white-space: nowrap; min-width: 48px; text-align: right; }
  .photo-badge { display: inline-block; width: 7px; height: 7px; background: var(--vert); border-radius: 50%; margin-left: 6px; vertical-align: middle; }

  /* MODAL DETAIL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
  .modal-box { background: var(--creme); border-radius: 12px; max-width: 480px; width: 100%; overflow: hidden; }
  .modal-img { width: 100%; height: 220px; object-fit: cover; display: block; }
  .modal-img.hidden { display: none; }
  .modal-body { padding: 1.2rem; }
  .modal-name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.85rem; color: var(--rouge); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .modal-desc { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: #5A4535; font-style: italic; line-height: 1.5; margin-bottom: 0.8rem; }
  .modal-price { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: var(--brun); }
  .modal-close { width: 100%; background: var(--brun); color: #fff; border: none; padding: 0.8rem; font-family: 'Montserrat', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }

  /* ADMIN */
  .admin-fab { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--rouge); color: #fff; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 15px rgba(155,28,28,0.4); z-index: 200; transition: transform 0.2s; }
  .admin-fab:hover { transform: scale(1.1); }

  .admin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: flex-end; }
  .admin-overlay.open { display: flex; }
  .admin-panel { background: #fff; width: 100%; max-height: 92vh; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 1.5rem; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
  .admin-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--rouge); margin-bottom: 0.3rem; }
  .admin-close { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gris); margin-top: -0.3rem; }
  .admin-search { width: 100%; padding: 0.7rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; margin: 0.8rem 0; outline: none; }
  .admin-search:focus { border-color: var(--rouge); }
  .admin-item { border: 1px solid #eee; border-radius: 8px; padding: 0.9rem; margin-bottom: 0.7rem; }
  .admin-item-name { font-weight: 600; font-size: 0.82rem; color: var(--rouge); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .admin-label { font-size: 0.68rem; color: var(--gris); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 0.2rem; margin-top: 0.4rem; }
  .admin-input { width: 100%; padding: 0.5rem 0.7rem; border: 1px solid #ddd; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; outline: none; }
  .admin-input:focus { border-color: var(--rouge); }
  .admin-input.price { max-width: 90px; }

  /* Photo upload */
  .photo-upload-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.4rem; }
  .photo-upload-btn { flex-shrink: 0; background: var(--vert); color: #fff; border: none; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 0.72rem; font-family: 'Montserrat', sans-serif; cursor: pointer; white-space: nowrap; }
  .photo-preview { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; display: none; }
  .photo-preview.visible { display: block; }
  .upload-progress { font-size: 0.72rem; color: var(--vert); font-family: 'Montserrat', sans-serif; display: none; }

  .admin-save-btn { width: 100%; background: var(--rouge); color: #fff; border: none; border-radius: 8px; padding: 0.9rem; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-top: 1rem; }

  .menu-enfant .e-price { font-size: 1.3rem; font-weight: 700; color: var(--brun); margin-top: 0.5rem; font-family: 'Cormorant Garamond', serif; }

  .supplements-box { background: var(--brun); color: #fff; border-radius: 8px; padding: 1.2rem; margin-top: 2rem; text-align: center; }
  .supplements-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--creme); margin-bottom: 0.4rem; }

  .sup-price { margin-top: 0.8rem; font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--creme); }

  .footer { text-align: center; padding: 1rem; font-size: 0.65rem; color: var(--gris); letter-spacing: 0.05em; border-top: 1px solid var(--creme-fonce); max-width: 700px; margin: 0 auto; }
</style>
</head>

<header>

</header>
<nav id="nav"></nav>
<main id="main"></main>
<div class="footer">Prix nets service compris · Allergènes disponibles sur demande</div>

<button class="admin-fab" onclick="openAdmin()">✎</button>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal-box">
    <img id="modalImg" src="" alt="" class="modal-img hidden">
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-price" id="modalPrice"></div>
    </div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Fermer</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="adminOverlay" onclick="closeAdminIfOutside(event)">
  <div class="admin-panel">
    <button class="admin-close" onclick="closeAdmin()">×</button>
    <h2>Modifier la carte</h2>
    <p style="font-size:0.75rem;color:#888;margin-bottom:0.5rem">Modifiez prix, descriptions et photos.</p>
    <input class="admin-search" type="text" placeholder="Rechercher un plat..." oninput="filterAdmin(this.value)">
    <div id="adminList"></div>
    <button class="admin-save-btn" onclick="saveChanges()">✓ Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast">✓ Modifications enregistrées !</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">

// Load saved data
function loadSaved() {
  try {
    const s = localStorage.getItem('milos_v2');
    if (!s) return;
    const saved = JSON.parse(s);
    saved.forEach(({sid, subcatIdx, idx, price, desc, photo}) => {
      const sec = MENU.sections[sid];
      if (!sec) return;
      const arr = subcatIdx !== undefined ? sec.subcats[subcatIdx].items : sec.items;
      if (arr && arr[idx]) {
        if (price !== undefined) arr[idx].price = price;
        if (desc !== undefined) arr[idx].desc = desc;
        if (photo !== undefined) arr[idx].photo = photo;
      }
    });
  } catch(e) {}
}

function renderAll() {
  const nav = document.getElementById('nav');
  nav.innerHTML = MENU.tabs.map((t,i) =>
    `<button onclick="showTab('${t.id}')" id="tab_${t.id}" class="${i===0?'active':''}">${t.label}</button>`
  ).join('');

  document.getElementById('main').innerHTML = MENU.tabs.map((t,i) => {
    const s = MENU.sections[t.id];
    if (!s) return '';
    let html = `<div class="section ${i===0?'active':''}" id="sec_${t.id}">`;
    html += `<div class="section-title">${s.title}</div>`;
    if (s.subtitle) html += `<div class="section-subtitle">${s.subtitle}</div>`;
    html += `<div class="divider"></div>`;
    if (s.items) s.items.forEach((item,idx) => { html += itemHTML(item, t.id, undefined, idx); });
    if (s.subcats) s.subcats.forEach((sub,si) => {
      html += `<div class="sub-cat">${sub.name}${sub.note?`<span style="display:block;font-size:0.8rem;font-weight:300;font-style:italic;text-transform:none;letter-spacing:0;color:#888">${sub.note}</span>`:''}</div>`;
      sub.items.forEach((item,idx) => { html += itemHTML(item, t.id, si, idx); });
    });
    if (s.extras) s.extras.forEach(e => {
      if (e==='menu_enfant') html += `<div class="menu-enfant"><div class="e-title">Menu Enfant</div><p>1 Mini Pizza (Reine ou Marguerite)<br>+ 1 Sirop à l'eau<br>+ 1 Boule de glace au choix</p><div class="e-price">12€</div></div>`;
      if (e==='supplements') html += `<div class="supplements-box"><h3>Ajoutez une touche gourmande</h3><p>Personnalisez votre pizza selon vos envies</p><div class="sup-tags">${['Fromage','Charcuterie','Légumes','Œuf','Burrata','Mozzarella','Jambon cuit','Bresaola','Artichauts','Poivrons','Champignons'].map(t=>`<span class="sup-tag">${t}</span>`).join('')}</div><div class="sup-price">À partir de <strong>1,5€</strong> seulement</div></div>`;
    });
    html += '</div>';
    return html;
  }).join('');
}

function itemHTML(item, sid, subcatIdx, idx) {
  const hasPhoto = item.photo && item.photo.trim();
  const key = `${sid}_${subcatIdx !== undefined ? subcatIdx+'_' : ''}${idx}`;
  return `<div class="item" onclick="openModal('${key}')">
    <div class="item-info">
      <div class="item-name">${item.name}${hasPhoto?'<span class="photo-badge"></span>':''}</div>
      ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
    </div>
    <div class="item-price">${item.price}</div>
  </div>`;
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec_'+id)?.classList.add('active');
  const btn = document.getElementById('tab_'+id);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}); }
}

function getItem(key) {
  const parts = key.split('_');
  const sid = parts[0];
  const sec = MENU.sections[sid];
  if (!sec) return null;
  if (parts.length === 3) {
    return sec.subcats[parseInt(parts[1])].items[parseInt(parts[2])];
  }
  return sec.items[parseInt(parts[1])];
}

function openModal(key) {
  const item = getItem(key);
  if (!item) return;
  const img = document.getElementById('modalImg');
  if (item.photo) { img.src = item.photo; img.className = 'modal-img'; img.onerror = ()=>img.className='modal-img hidden'; }
  else { img.src=''; img.className='modal-img hidden'; }
  document.getElementById('modalName').textContent = item.name;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalPrice').textContent = item.price;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModalIfOutside(e) {
  if (e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
}

// ADMIN
let allItems = [];
function buildAllItems() {
  allItems = [];
  MENU.tabs.forEach(t => {
    const s = MENU.sections[t.id];
    if (!s) return;
    if (s.items) s.items.forEach((item,idx) => allItems.push({sid:t.id, subcatIdx:undefined, idx, item, cat:s.title}));
    if (s.subcats) s.subcats.forEach((sub,si) => sub.items.forEach((item,idx) => allItems.push({sid:t.id, subcatIdx:si, idx, item, cat:sub.name})));
  });
}

function openAdmin() {
  buildAllItems();
  renderAdminList(allItems);
  document.getElementById('adminOverlay').classList.add('open');
}
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }
function closeAdminIfOutside(e) { if (e.target===document.getElementById('adminOverlay')) closeAdmin(); }

function filterAdmin(q) {
  const f = q.toLowerCase();
  renderAdminList(allItems.filter(({item,cat}) => item.name.toLowerCase().includes(f) || cat.toLowerCase().includes(f)));
}

function renderAdminList(items) {
  document.getElementById('adminList').innerHTML = items.map(({sid,subcatIdx,idx,item,cat}) => {
    const uid = `${sid}_${subcatIdx!==undefined?subcatIdx+'_':''}${idx}`;
    return `<div class="admin-item">
      <div class="admin-item-name">${item.name} <span style="color:#aaa;font-weight:300;text-transform:none;font-size:0.7rem">— ${cat}</span></div>
      <label class="admin-label">Prix</label>
      <input class="admin-input price" id="p_${uid}" value="${item.price}">
      <label class="admin-label">Description</label>
      <input class="admin-input" id="d_${uid}" value="${item.desc}">
      <label class="admin-label">Photo</label>
      <div class="photo-upload-row">
        <button class="photo-upload-btn" onclick="triggerUpload('${uid}')">📷 Uploader</button>
        <input class="admin-input" id="ph_${uid}" value="${item.photo||''}" placeholder="ou coller un lien URL" style="flex:1">
        <img id="prev_${uid}" src="${item.photo||''}" class="photo-preview ${item.photo?'visible':''}" onerror="this.className='photo-preview'">
        <span class="upload-progress" id="prog_${uid}">Envoi...</span>
      </div>
    </div>`;
  }).join('') || '<p style="text-align:center;color:#aaa;padding:1rem;font-size:0.8rem">Aucun plat trouvé</p>';
}

function triggerUpload(uid) {
  currentUploadUid = uid;
  document.getElementById('fileInput').click();
}

async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file || !currentUploadUid) return;
  const uid = currentUploadUid;
  const prog = document.getElementById('prog_'+uid);
  if (prog) prog.style.display = 'inline';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    const url = data.secure_url;
    const input = document.getElementById('ph_'+uid);
    const prev = document.getElementById('prev_'+uid);
    if (input) input.value = url;
    if (prev) { prev.src = url; prev.className = 'photo-preview visible'; }
    if (prog) prog.style.display = 'none';
  } catch(err) {
    if (prog) { prog.textContent = 'Erreur'; prog.style.display = 'inline'; }
  }
  e.target.value = '';
}

function saveChanges() {
  const saved = [];
  allItems.forEach(({sid,subcatIdx,idx,item}) => {
    const uid = `${sid}_${subcatIdx!==undefined?subcatIdx+'_':''}${idx}`;
    const p = document.getElementById('p_'+uid);
    const d = document.getElementById('d_'+uid);
    const ph = document.getElementById('ph_'+uid);
    if (!p) return;
    item.price = p.value;
    item.desc = d.value;
    item.photo = ph ? ph.value : (item.photo||'');
    saved.push({sid, subcatIdx, idx, price:item.price, desc:item.desc, photo:item.photo});
  });
  try { localStorage.setItem('milos_v2', JSON.stringify(saved)); } catch(e){}
  renderAll();
  closeAdmin();
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 2500);
}

loadSaved();
renderAll();
</script>
