<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning - Milo's Pizza</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bx:#B91E26;--bxdk:#8B1118;--cr:#F2E0C0;--tx:#2A0A0B;--txm:#7A4A35;--txf:#B08060;--bd:#E8D5B5;--wh:#fff}
body{background:var(--cr);font-family:-apple-system,sans-serif;color:var(--tx);min-height:100vh}
.bar{background:var(--bx);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(139,17,24,.3)}
.bar img{width:50px}
.bar-t{color:#fff;font-size:15px;font-weight:700;flex:1}
.bar-sub{color:rgba(255,255,255,.75);font-size:11px}
.page{padding:14px;max-width:900px;margin:0 auto}
.card{background:var(--wh);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:700;color:var(--bx);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s}
.btn:active{opacity:.8}
.bp{background:var(--bx);color:#fff}
.bs{background:#FAF4EC;color:var(--tx);border:1px solid var(--bd)}
.bg2{background:#276749;color:#fff}
.ba{background:#92610A;color:#fff}
.br{background:#991B1B;color:#fff}
.sm{padding:5px 10px;font-size:11px}
.fs{background:var(--wh);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--tx);outline:none;cursor:pointer}
.fi{width:100%;background:#FAF4EC;border:1px solid var(--bd);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--tx);outline:none}
.fi:focus{border-color:var(--bx)}
/* WEEK NAV */
.wnav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.wlabel{font-size:13px;font-weight:700;color:var(--txm);flex:1;text-align:center}
/* TABS RESTAURANT */
.rtabs{display:flex;gap:6px;margin-bottom:14px}
.rtab{padding:8px 16px;border-radius:8px;border:2px solid var(--bd);background:var(--wh);color:var(--txm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.rtab.on{background:var(--bx);border-color:var(--bx);color:#fff}
/* SALARIÉ CARD */
.emp-card{background:var(--wh);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.emp-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.emp-avatar{width:36px;height:36px;border-radius:50%;background:var(--bx);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.emp-name{font-weight:600;font-size:14px;flex:1}
.emp-resto{font-size:10px;color:var(--txm)}
.emp-toggle{font-size:18px;color:var(--txm);transition:transform .2s}
.emp-toggle.open{transform:rotate(90deg)}
.emp-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bd)}
.emp-body.open{display:block}
/* TEMPLATE RAPIDE */
.tpl-row{background:#FAF4EC;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.tpl-title{font-size:11px;font-weight:700;color:var(--txm);text-transform:uppercase;margin-bottom:8px}
.tpl-inputs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tpl-input{width:90px;background:var(--wh);border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:13px;color:var(--tx);outline:none}
.tpl-input:focus{border-color:var(--bx)}
.days-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.day-cb{display:none}
.day-lbl{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:2px solid var(--bd);font-size:12px;font-weight:600;cursor:pointer;color:var(--txm);transition:all .15s}
.day-cb:checked+.day-lbl{background:var(--bx);border-color:var(--bx);color:#fff}
/* PLANNING JOURS */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.day-col{background:#FAF4EC;border-radius:8px;padding:8px 6px;min-height:80px}
.day-head{font-size:10px;font-weight:700;color:var(--txm);text-align:center;margin-bottom:4px;text-transform:uppercase}
.day-date{font-size:9px;color:var(--txf);text-align:center;margin-bottom:6px}
.créneau{background:var(--wh);border:1px solid var(--bd);border-radius:6px;padding:5px 6px;margin-bottom:4px;position:relative}
.cr-time{font-size:11px;font-weight:600;color:var(--bx);text-align:center}
.cr-del{position:absolute;top:2px;right:3px;background:none;border:none;color:#ccc;cursor:pointer;font-size:12px;line-height:1;padding:0}
.cr-del:hover{color:var(--bx)}
.add-cr{width:100%;background:none;border:1px dashed var(--bd);border-radius:6px;padding:4px;font-size:11px;color:var(--txm);cursor:pointer;text-align:center}
.add-cr:hover{border-color:var(--bx);color:var(--bx)}
.off-badge{font-size:10px;color:var(--txf);text-align:center;padding:4px 0}
/* MODAL */
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:14px}
.mb.op{display:flex}
.md{background:var(--wh);border-radius:14px;padding:18px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.mdt{font-size:14px;font-weight:700;color:var(--bx);margin-bottom:14px}
.fr{margin-bottom:10px}
.fl2{font-size:11px;font-weight:700;color:var(--txm);text-transform:uppercase;display:block;margin-bottom:3px}
.ma{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
/* DUPLI */
.sal-check{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.sal-check:last-child{border-bottom:none}
.sal-check input{width:18px;height:18px;accent-color:var(--bx)}
/* PLANNING GENERAL */
.pg-wrap{overflow-x:auto}
.pg-table{border-collapse:collapse;width:100%;font-size:11px}
.pg-table th{background:var(--bx);color:#fff;padding:6px 8px;text-align:center;font-weight:600;white-space:nowrap}
.pg-table th:first-child{text-align:left}
.pg-table td{border:1px solid var(--bd);padding:5px 7px;vertical-align:top;min-width:80px}
.pg-table td:first-child{font-weight:600;background:#FAF4EC;min-width:120px}
.pg-cr{font-size:10px;color:var(--bx);font-weight:600;display:block}
.pg-off{font-size:10px;color:var(--txf)}
/* ACTIONS BAR */
.act-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
@media(max-width:600px){.days-grid{grid-template-columns:repeat(4,1fr)}.tpl-inputs{gap:6px}}
</style>
</head>

    <div class="ma">
      <button class="btn bs" onclick="closeModal('modal-confirm')">Annuler</button>
      <button class="btn br" onclick="executeDupli()">Écraser et dupliquer</button>
    </div>

<script>
var db=supabase.createClient(SURL,SKEY);
var emps=[];
var curResto='port';
var weekStart=monOf(new Date());
// planning[emp_id][dateStr] = [{start,end}]
var planning={};
var curCrInfo=null; // {empId, dateStr, idx or null}
var dupliSels=[];

var DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var DAYS_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

function monOf(d){var x=new Date(d);var day=x.getDay();var diff=x.getDate()-(day===0?6:day-1);x.setDate(diff);x.setHours(0,0,0,0);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function ds(d){return d.toISOString().slice(0,10);}
function fmt(d){return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}
function closeModal(id){document.getElementById(id).classList.remove('op');}

function getWeekDates(){
  var dates=[];
  for(var i=0;i<7;i++)dates.push(addDays(weekStart,i));
  return dates;
}

function updateWeekLabel(){
  var dates=getWeekDates();
  var lbl='Du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('week-label').textContent=lbl;
  document.getElementById('bar-week').textContent=lbl;
}

function prevWeek(){weekStart=addDays(weekStart,-7);updateWeekLabel();loadPlanning();}
function nextWeek(){weekStart=addDays(weekStart,7);updateWeekLabel();loadPlanning();}

function switchResto(resto,el){
  curResto=resto;
  document.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('general-section').style.display='none';
  renderEmps();
}

async function init(){
  updateWeekLabel();
  var r=await db.from('employees').select('*').eq('actif',true).order('nom');
  emps=r.data||[];
  await loadPlanning();
}

async function loadPlanning(){
  var dates=getWeekDates();
  var we=addDays(weekStart,6);we.setHours(23,59,59);
  var empIds=emps.map(function(e){return e.id;});
  if(!empIds.length){renderEmps();return;}
  var r=await db.from('planning_creneaux').select('*').gte('date',ds(weekStart)).lte('date',ds(we)).in('employee_id',empIds);
  planning={};
  (r.data||[]).forEach(function(c){
    if(!planning[c.employee_id])planning[c.employee_id]={};
    if(!planning[c.employee_id][c.date])planning[c.employee_id][c.date]=[];
    planning[c.employee_id][c.date].push({id:c.id,start:c.heure_debut,end:c.heure_fin});
  });
  // Trier les créneaux par heure de début
  Object.keys(planning).forEach(function(eid){
    Object.keys(planning[eid]).forEach(function(d){
      planning[eid][d].sort(function(a,b){return a.start.localeCompare(b.start);});
    });
  });
  renderEmps();
}

function renderEmps(){
  var list=document.getElementById('emp-list');
  var filtered=emps.filter(function(e){
    if(e.restaurant_id===curResto)return true;
    if(e.multi_site)return true;
    return false;
  });
  if(!filtered.length){list.innerHTML='<div class="card" style="text-align:center;color:#aaa;padding:20px">Aucun salarié</div>';return;}
  var h='';
  filtered.forEach(function(emp){
    var dates=getWeekDates();
    var restoTag=emp.multi_site&&emp.restaurant_id!==curResto?'<span style="font-size:9px;background:#EDE9FE;color:#5B21B6;padding:1px 5px;border-radius:10px;margin-left:4px">Multi-site</span>':'';
    var restoLabel=emp.restaurant_id==='port'?'Port':'Dabray';
    h+='<div class="emp-card" id="card-'+emp.id+'">';
    h+='<div class="emp-header" onclick="toggleEmp('+emp.id+')">';
    h+='<div class="emp-avatar">'+emp.prenom[0]+'</div>';
    h+='<div><div class="emp-name">'+emp.prenom+' '+emp.nom+restoTag+'</div>';
    h+='<div class="emp-resto">'+restoLabel+'</div></div>';
    h+='<span class="emp-toggle" id="tog-'+emp.id+'">&#9654;</span>';
    h+='</div>';
    h+='<div class="emp-body" id="body-'+emp.id+'">';
    // Template rapide
    h+='<div class="tpl-row">';
    h+='<div class="tpl-title">Application rapide</div>';
    h+='<div class="tpl-inputs">';
    h+='<input type="time" class="tpl-input" id="tpl-s-'+emp.id+'" value="17:00"> &#8594; ';
    h+='<input type="time" class="tpl-input" id="tpl-e-'+emp.id+'" value="23:30">';
    h+='</div>';
    h+='<div class="days-row">';
    DAYS.forEach(function(d,i){
      h+='<input type="checkbox" class="day-cb" id="dc-'+emp.id+'-'+i+'">';
      h+='<label class="day-lbl" for="dc-'+emp.id+'-'+i+'">'+d+'</label>';
    });
    h+='</div>';
    h+='<button class="btn bp sm" onclick="applyTemplate('+emp.id+')">Appliquer aux jours cochés</button>';
    h+='</div>';
    // Grille 7 jours
    h+='<div class="days-grid">';
    dates.forEach(function(date,i){
      var dateStr=ds(date);
      var crs=(planning[emp.id]&&planning[emp.id][dateStr])||[];
      h+='<div class="day-col">';
      h+='<div class="day-head">'+DAYS[i]+'</div>';
      h+='<div class="day-date">'+date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+'</div>';
      if(crs.length===0){
        h+='<div class="off-badge">Off</div>';
      }else{
        crs.forEach(function(cr,ci){
          h+='<div class="créneau">';
          h+='<button class="cr-del" onclick="delCreneau('+emp.id+',''+dateStr+'','+ci+')">&#10005;</button>';
          h+='<div class="cr-time">'+cr.start+' - '+cr.end+'</div>';
          h+='</div>';
        });
      }
      h+='<button class="add-cr" onclick="openAddCr('+emp.id+',''+dateStr+'')">+</button>';
      h+='</div>';
    });
    h+='</div>';
    h+='</div>';
    h+='</div>';
  });
  list.innerHTML=h;
}

function toggleEmp(id){
  var body=document.getElementById('body-'+id);
  var tog=document.getElementById('tog-'+id);
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  tog.classList.toggle('open',!isOpen);
}

function applyTemplate(empId){
  var start=document.getElementById('tpl-s-'+empId).value;
  var end=document.getElementById('tpl-e-'+empId).value;
  if(!start||!end){alert('Saisissez les heures');return;}
  var dates=getWeekDates();
  var changed=false;
  DAYS.forEach(function(d,i){
    var cb=document.getElementById('dc-'+empId+'-'+i);
    if(cb&&cb.checked){
      var dateStr=ds(dates[i]);
      if(!planning[empId])planning[empId]={};
      if(!planning[empId][dateStr])planning[empId][dateStr]=[];
      // Vérifier si ce créneau existe déjà
      var exists=planning[empId][dateStr].some(function(c){return c.start===start&&c.end===end;});
      if(!exists){
        planning[empId][dateStr].push({start:start,end:end,_new:true});
        planning[empId][dateStr].sort(function(a,b){return a.start.localeCompare(b.start);});
        changed=true;
      }
    }
  });
  if(changed)renderEmps();
  else alert('Aucun jour coché ou créneau déjà existant');
}

function openAddCr(empId,dateStr){
  curCrInfo={empId:empId,dateStr:dateStr};
  document.getElementById('cr-title').textContent='Ajouter un créneau — '+new Date(dateStr+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('cr-start').value='09:00';
  document.getElementById('cr-end').value='17:00';
  document.getElementById('modal-cr').classList.add('op');
}

function saveCreneau(){
  if(!curCrInfo)return;
  var start=document.getElementById('cr-start').value;
  var end=document.getElementById('cr-end').value;
  if(!start||!end){alert('Saisissez les heures');return;}
  var eid=curCrInfo.empId;var d=curCrInfo.dateStr;
  if(!planning[eid])planning[eid]={};
  if(!planning[eid][d])planning[eid][d]=[];
  planning[eid][d].push({start:start,end:end,_new:true});
  planning[eid][d].sort(function(a,b){return a.start.localeCompare(b.start);});
  closeModal('modal-cr');
  renderEmps();
  // Réouvrir le panneau salarié
  var body=document.getElementById('body-'+eid);
  var tog=document.getElementById('tog-'+eid);
  if(body){body.classList.add('open');tog.classList.add('open');}
}

function delCreneau(empId,dateStr,idx){
  if(!planning[empId]||!planning[empId][dateStr])return;
  var cr=planning[empId][dateStr][idx];
  if(cr.id){cr._del=true;}
  else{planning[empId][dateStr].splice(idx,1);}
  renderEmps();
  var body=document.getElementById('body-'+empId);
  var tog=document.getElementById('tog-'+empId);
  if(body){body.classList.add('open');tog.classList.add('open');}
}

async function saveAll(){
  var btn=document.querySelector('.btn.bg2');
  btn.textContent='Sauvegarde...';btn.disabled=true;
  var errors=0;
  for(var eid in planning){
    for(var d in planning[eid]){
      var crs=planning[eid][d];
      for(var i=0;i<crs.length;i++){
        var cr=crs[i];
        if(cr._del&&cr.id){
          var r=await db.from('planning_creneaux').delete().eq('id',cr.id);
          if(r.error)errors++;
        }else if(cr._new&&!cr._del){
          var r2=await db.from('planning_creneaux').insert({employee_id:parseInt(eid),date:d,heure_debut:cr.start,heure_fin:cr.end});
          if(r2.error)errors++;
          else{cr._new=false;if(r2.data&&r2.data[0])cr.id=r2.data[0].id;}
        }
      }
      // Nettoyer les supprimés
      planning[eid][d]=crs.filter(function(c){return !c._del;});
    }
  }
  btn.textContent=errors?'Erreurs ('+errors+')':'&#10003; Enregistré';
  btn.disabled=false;
  setTimeout(function(){btn.innerHTML='&#10003; Enregistrer';},2000);
  await loadPlanning();
}

// DUPLICATION
function openDupli(){
  var filtered=emps.filter(function(e){return e.restaurant_id===curResto||(e.multi_site);});
  var h='';
  filtered.forEach(function(em){
    h+='<div class="sal-check">';
    h+='<input type="checkbox" id="dup-'+em.id+'" checked>';
    h+='<label for="dup-'+em.id+'" style="font-size:13px;cursor:pointer">'+em.prenom+' '+em.nom+'</label>';
    h+='</div>';
  });
  document.getElementById('dupli-list').innerHTML=h;
  document.getElementById('modal-dupli').classList.add('op');
}

function checkAll(v){
  document.querySelectorAll('#dupli-list input[type=checkbox]').forEach(function(cb){cb.checked=v;});
}

function confirmDupli(){
  dupliSels=[];
  document.querySelectorAll('#dupli-list input[type=checkbox]').forEach(function(cb){
    if(cb.checked)dupliSels.push(parseInt(cb.id.replace('dup-','')));
  });
  if(!dupliSels.length){alert('Sélectionnez au moins un salarié');return;}
  var nextMon=addDays(weekStart,7);
  document.getElementById('confirm-msg').textContent='Le planning de '+dupliSels.length+' salarié(s) sera copié sur la semaine du '+nextMon.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})+'. Les créneaux existants seront écrasés.';
  closeModal('modal-dupli');
  document.getElementById('modal-confirm').classList.add('op');
}

async function executeDupli(){
  closeModal('modal-confirm');
  var dates=getWeekDates();
  var nextDates=dates.map(function(d){return addDays(d,7);});
  var errors=0;
  for(var si=0;si<dupliSels.length;si++){
    var eid=dupliSels[si];
    for(var di=0;di<dates.length;di++){
      var srcDate=ds(dates[di]);
      var dstDate=ds(nextDates[di]);
      var crs=(planning[eid]&&planning[eid][srcDate])||[];
      // Supprimer les créneaux existants à la destination
      await db.from('planning_creneaux').delete().eq('employee_id',eid).eq('date',dstDate);
      // Insérer les nouveaux
      for(var ci=0;ci<crs.length;ci++){
        if(!crs[ci]._del){
          var r=await db.from('planning_creneaux').insert({employee_id:eid,date:dstDate,heure_debut:crs[ci].start,heure_fin:crs[ci].end});
          if(r.error)errors++;
        }
      }
    }
  }
  alert(errors?'Dupliqué avec '+errors+' erreur(s)':'Planning dupliqué avec succès !');
}

// PLANNING GÉNÉRAL
function showGeneral(){
  var section=document.getElementById('general-section');
  var isVisible=section.style.display!=='none';
  if(isVisible){section.style.display='none';return;}
  section.style.display='block';
  renderGeneral();
  section.scrollIntoView({behavior:'smooth'});
}

function renderGeneral(){
  var dates=getWeekDates();
  var filtered=emps.filter(function(e){return e.restaurant_id===curResto||(e.multi_site);});
  var restoLabel=curResto==='port'?'Port — Bavastro':'Dabray';
  var weekLabel='Semaine du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('gen-title').textContent=restoLabel+' — '+weekLabel;
  var th='<thead><tr><th>Salarié</th>';
  dates.forEach(function(d,i){
    th+='<th>'+DAYS[i]+'<br><span style="font-size:9px;opacity:.8">'+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+'</span></th>';
  });
  th+='</tr></thead>';
  var tb='<tbody>';
  filtered.forEach(function(em){
    tb+='<tr><td>'+em.prenom+' '+em.nom+'</td>';
    dates.forEach(function(d){
      var dateStr=ds(d);
      var crs=(planning[em.id]&&planning[em.id][dateStr])||[];
      tb+='<td>';
      if(!crs.length){tb+='<span class="pg-off">Off</span>';}
      else{crs.forEach(function(cr){tb+='<span class="pg-cr">'+cr.start+' - '+cr.end+'</span>';});}
      tb+='</td>';
    });
    tb+='</tr>';
  });
  tb+='</tbody>';
  document.getElementById('gen-table').innerHTML=th+tb;
}

// EXPORT PDF GÉNÉRAL A4 PAYSAGE
async function exportGeneralPDF(){
  var{jsPDF}=window.jspdf;
  if(!jsPDF){alert('PDF non disponible');return;}
  var doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  var dates=getWeekDates();
  var filtered=emps.filter(function(e){return e.restaurant_id===curResto||(e.multi_site);});
  var restoLabel=curResto==='port'?'Port - Bavastro':'Dabray';
  var weekLabel='Semaine du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  // En-tête
  doc.setFillColor(185,30,38);
  doc.rect(0,0,297,18,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text("Milo's Pizza — Planning "+restoLabel,10,12);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(weekLabel,10,17);
  // Tableau
  var cols=[45,35,35,35,35,35,35,35];
  var headers=['Salarié'].concat(dates.map(function(d,i){return DAYS_FULL[i]+'
'+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}));
  var startY=24;var rowH=10;
  // Header tableau
  doc.setFillColor(242,224,192);
  doc.setTextColor(122,74,53);
  doc.setFontSize(9);doc.setFont('helvetica','bold');
  var x=10;
  cols.forEach(function(w,i){
    doc.rect(x,startY,w,rowH,'FD');
    var lines=headers[i].split('
');
    lines.forEach(function(l,li){doc.text(l,x+2,startY+4+(li*4));});
    x+=w;
  });
  // Rows
  doc.setFont('helvetica','normal');doc.setTextColor(42,10,11);
  var y=startY+rowH;
  filtered.forEach(function(em,ri){
    if(ri%2===0)doc.setFillColor(250,244,236);
    else doc.setFillColor(255,255,255);
    var x2=10;
    // Calculer hauteur max ligne
    var maxLines=1;
    dates.forEach(function(d){
      var crs=(planning[em.id]&&planning[em.id][ds(d)])||[];
      if(crs.length>maxLines)maxLines=crs.length;
    });
    var rh=Math.max(10,maxLines*6+4);
    cols.forEach(function(w,ci){
      doc.rect(x2,y,w,rh,'FD');
      if(ci===0){
        doc.setFontSize(9);doc.setFont('helvetica','bold');
        doc.text(em.prenom+' '+em.nom,x2+2,y+6);
        doc.setFont('helvetica','normal');
      }else{
        var dateStr=ds(dates[ci-1]);
        var crs=(planning[em.id]&&planning[em.id][dateStr])||[];
        doc.setFontSize(8);doc.setTextColor(185,30,38);
        if(!crs.length){doc.setTextColor(176,128,96);doc.text('Off',x2+2,y+6);doc.setTextColor(42,10,11);}
        else{crs.forEach(function(cr,i){doc.text(cr.start+'-'+cr.end,x2+2,y+5+(i*5));});}
        doc.setTextColor(42,10,11);
      }
      x2+=w;
    });
    y+=rh;
    if(y>185){doc.addPage();y=20;}
  });
  // Footer
  doc.setFontSize(7);doc.setTextColor(176,128,96);
  doc.text('Généré le '+new Date().toLocaleDateString('fr-FR')+' — Milo's Pizza',10,200);
  var today=new Date();
  var fname=today.getFullYear()+'_'+String(today.getMonth()+1).padStart(2,'0')+'_'+String(today.getDate()).padStart(2,'0')+'_planning_'+restoLabel.replace(/ /g,'_').replace(/[^a-zA-Z0-9_]/g,'')+'.pdf';
  doc.save(fname);
}

// EXPORT PDF INDIVIDUEL
async function exportIndivPDF(empId){
  var{jsPDF}=window.jspdf;
  if(!jsPDF){alert('PDF non disponible');return;}
  var em=emps.find(function(e){return e.id===empId;});
  if(!em)return;
  var doc=new jsPDF({unit:'mm',format:'a4'});
  var dates=getWeekDates();
  var weekLabel='Semaine du '+dates[0].toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' au '+dates[6].toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  doc.setFillColor(185,30,38);doc.rect(0,0,210,20,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text("Milo's Pizza — Planning individuel",10,12);
  doc.setFontSize(10);doc.text(weekLabel,10,18);
  doc.setTextColor(42,10,11);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text(em.prenom+' '+em.nom,10,30);
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(122,74,53);
  doc.text(em.restaurant_id==='port'?'Port — Bavastro':'Dabray',10,36);
  var y=44;
  dates.forEach(function(d,i){
    var dateStr=ds(d);
    var crs=(planning[em.id]&&planning[em.id][dateStr])||[];
    doc.setFillColor(242,224,192);doc.rect(10,y,190,8,'F');
    doc.setTextColor(122,74,53);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(DAYS_FULL[i]+' '+d.toLocaleDateString('fr-FR',{day:'numeric',month:'long'}),13,y+5.5);
    y+=8;
    if(!crs.length){
      doc.setFillColor(255,255,255);doc.rect(10,y,190,8,'FD');
      doc.setTextColor(176,128,96);doc.setFont('helvetica','normal');doc.setFontSize(10);
      doc.text('Repos',13,y+5.5);y+=8;
    }else{
      crs.forEach(function(cr){
        doc.setFillColor(255,255,255);doc.rect(10,y,190,8,'FD');
        doc.setTextColor(185,30,38);doc.setFont('helvetica','bold');doc.setFontSize(10);
        doc.text(cr.start+' — '+cr.end,13,y+5.5);y+=8;
      });
    }
    y+=2;
  });
  doc.setFontSize(7);doc.setTextColor(176,128,96);
  doc.text('Généré le '+new Date().toLocaleDateString('fr-FR'),10,285);
  var today=new Date();
  var fname=today.getFullYear()+'_'+String(today.getMonth()+1).padStart(2,'0')+'_'+String(today.getDate()).padStart(2,'0')+'_'+em.nom.replace(/ /g,'_')+'_'+em.prenom.replace(/ /g,'_')+'.pdf';
  doc.save(fname);
}

init();
</script>
