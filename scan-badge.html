<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Scanner un badge - Milo's Pizza</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,Roboto,sans-serif;background:#B91E26;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px}
  h1{font-size:21px;margin-bottom:6px;text-align:center}
  .sub{font-size:13px;opacity:.85;text-align:center;margin-bottom:24px}
  .card{background:#fff;color:#222;border-radius:16px;padding:22px;width:100%;max-width:420px}
  .btn{width:100%;background:#fff;color:#B91E26;border:2px solid #B91E26;border-radius:14px;padding:18px;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:14px}
  .btn:disabled{opacity:.5}
  .btn2{width:100%;background:#B91E26;color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
  .status{font-size:14px;padding:14px;border-radius:10px;text-align:center;margin-bottom:12px}
  .ok{background:#D1FAE5;color:#065F46}
  .err{background:#FEE2E2;color:#991B1B}
  .info{background:#FEF3C7;color:#92400E}
  .uid{font-family:monospace;font-size:18px;font-weight:700;color:#B91E26;text-align:center;padding:14px;background:#FDF2F2;border-radius:12px;word-break:break-all;margin:8px 0}
  .label{font-size:12px;color:#888;text-align:center}
  #qrbox{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:12px;margin:12px 0}
  .qrhint{font-size:13px;color:#444;text-align:center;background:#F3F4F6;border-radius:10px;padding:12px;margin-top:8px}
</style>
</head>
<body>
  <h1>&#128290; Scanner un badge</h1>
  <div class="sub">Pour associer un badge &agrave; un salari&eacute;</div>
  <div class="card">
    <div id="compat"></div>
    <button class="btn" id="scanbtn" onclick="startScan()">D&eacute;marrer le scan</button>
    <div id="result"></div>
  </div>
<script>
window.addEventListener('load',function(){
  var c=document.getElementById('compat');
  if('NDEFReader' in window){
    c.innerHTML='<div class="status info">Appuyez sur \u00ab D\u00e9marrer le scan \u00bb puis approchez le badge.</div>';
  }else{
    c.innerHTML='<div class="status err">\u274C Cet appareil ne supporte pas le NFC web. Utilisez Chrome sur Android avec le NFC activ\u00e9.</div>';
    document.getElementById('scanbtn').disabled=true;
  }
});
async function startScan(){
  var r=document.getElementById('result');
  if(!('NDEFReader' in window)){r.innerHTML='<div class="status err">NFC non support\u00e9.</div>';return;}
  try{
    r.innerHTML='<div class="status info">\u23F3 Approchez le badge du dos du t\u00e9l\u00e9phone...</div>';
    var ndef=new NDEFReader();
    await ndef.scan();
    ndef.onreading=function(event){
      var uid=event.serialNumber||'(non disponible)';
      showUid(uid);
      if(navigator.vibrate)navigator.vibrate(200);
    };
    ndef.onreadingerror=function(){r.innerHTML='<div class="status err">Erreur de lecture. R\u00e9essayez.</div>';};
  }catch(e){
    r.innerHTML='<div class="status err">Erreur : '+e.message+'<br>V\u00e9rifiez que le NFC est activ\u00e9 et que vous \u00eates sur Chrome.</div>';
  }
}
function showUid(uid){
  var r=document.getElementById('result');
  r.innerHTML='<div class="status ok">\u2705 Badge lu !</div>'+
    '<div class="label">UID du badge :</div>'+
    '<div class="uid" id="uidval">'+uid+'</div>'+
    '<div id="qrbox"></div>'+
    '<div class="qrhint">\u{1F4F1} Scannez ce QR code avec l\u0027appareil photo de votre iPhone pour r\u00e9cup\u00e9rer l\u0027UID, puis collez-le dans la fiche du salari\u00e9.</div>'+
    '<button class="btn2" onclick="copyUid()">\u{1F4CB} Ou copier l\u0027UID</button>';
  // Générer le QR code
  var qb=document.getElementById('qrbox');
  qb.innerHTML='';
  try{
    new QRCode(qb,{text:uid,width:180,height:180,colorDark:'#000',colorLight:'#fff'});
  }catch(e){
    qb.innerHTML='<span style="color:#888;font-size:12px">QR indisponible, utilisez le bouton copier</span>';
  }
}
function copyUid(){
  var uid=document.getElementById('uidval').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(uid).then(function(){alert('UID copi\u00e9 : '+uid);});}
  else{alert('UID : '+uid);}
}
</script>
</body>
</html>
